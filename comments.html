<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Comments Section</title>
    <!-- Import Firebase libraries -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <!-- Import Replit Object Storage Library -->
    <script src="https://replit.com/site/packages/replit-object-storage/replit-object-storage.js"></script>
    <script>
      // Firebase configuration
      const firebaseConfig = {
        apiKey: "AIzaSyCfrP-AaY1cGuj5zQ-ygPBp_SI0oT4zA7s",
        authDomain: "comments-ff6c9.firebaseapp.com",
        databaseURL: "https://comments-ff6c9-default-rtdb.firebaseio.com",
        projectId: "comments-ff6c9",
        storageBucket: "comments-ff6c9.appspot.com",
        messagingSenderId: "778548096311",
        appId: "1:778548096311:web:968b95a4fc97f13f21feb2",
        measurementId: "G-T8QFHWJDB5",
      };

      // Initialize Firebase
      firebase.initializeApp(firebaseConfig);
      const database = firebase.database();

      // Global DOM Elements
      let form,
        feedback,
        commentsSection,
        loadMoreButton,
        fileInput,
        mediaUrlInput;

      const commentsPerPage = 5; // Number of comments per page
      let lastLoadedKey = null;

      // Load Comments with Pagination
      const loadComments = (parentId = null) => {
        let commentsRef = database.ref("comments");
        if (parentId) {
          commentsRef = commentsRef.child(parentId).child("replies");
        }
        if (lastLoadedKey) {
          commentsRef = commentsRef.orderByKey().endBefore(lastLoadedKey);
        }
        commentsRef = commentsRef.limitToLast(commentsPerPage);

        commentsRef.once("value", (snapshot) => {
          const comments = snapshot.val();

          if (comments) {
            // Store the last key for pagination
            lastLoadedKey = Object.keys(comments)[0];

            // Display each comment
            Object.entries(comments)
              .reverse() // Ensure reverse order (latest first)
              .forEach(([key, comment]) => {
                displayComment(key, comment, parentId);
              });
          } else {
            loadMoreButton.style.display = "none"; // Hide "Load More" if no more comments
          }
        });
      };

      // Display a Single Comment
      const displayComment = (key, comment, parentId = null) => {
        const commentDiv = document.createElement("div");
        commentDiv.setAttribute("data-id", key);
        commentDiv.style.marginLeft = parentId ? "20px" : "0";

        commentDiv.innerHTML = `
          <strong class="comment-username">${comment.username}</strong>: <em>${comment.subject}</em>
          <p class="comment-message">${comment.message}</p>
          ${
            comment.mediaUrl
              ? `<img src="${comment.mediaUrl}" alt="Media" style="max-width: 100%; height: auto;" class="comment-media" />`
              : ""
          }
          ${
            comment.mediaFile
              ? `<a href="${comment.mediaFile}" download class="comment-media-download">Download Media</a>`
              : ""
          }
          <button onclick="replyToComment('${key}', '${parentId || ""}')" class="comment-reply-button">Reply</button>
          <div class="replies" id="replies-${key}"></div>
          <hr />
        `;

        const container = parentId
          ? document.getElementById(`replies-${parentId}`)
          : commentsSection;
        container.prepend(commentDiv);

        // Load replies
        if (comment.replies) {
          Object.entries(comment.replies).forEach(([replyKey, reply]) => {
            displayComment(replyKey, reply, key);
          });
        }
      };

      // Submit Comment or Reply
      const submitComment = async (e, parentId = null) => {
        e.preventDefault();
        const username = document.getElementById("username").value.trim();
        const subject = document.getElementById("subject").value.trim();
        const message = document.getElementById("message").value.trim();
        const mediaUrl = mediaUrlInput.value.trim();
        const file = fileInput.files[0]; // Get selected file

        // Validation for required fields
        if (!username || !subject || !message) {
          feedback.textContent = "All fields except media are required.";
          feedback.style.color = "red";
          setTimeout(() => (feedback.textContent = ""), 3000);
          return;
        }

        try {
          const commentKey = Date.now().toString();
          const newComment = {
            username,
            subject,
            message,
            mediaUrl,
            timestamp: firebase.database.ServerValue.TIMESTAMP,
          };

          // Upload file to Object Storage if selected
          if (file) {
            const client = new replit.object_storage.Client();
            const filename = file.name;
            const mediaFile = await client.upload(filename, file);
            newComment.mediaFile = mediaFile; // Store the Object Storage URL
          }

          if (parentId) {
            await database.ref(`comments/${parentId}/replies/${commentKey}`).set(newComment);
          } else {
            await database.ref(`comments/${commentKey}`).set(newComment);
          }

          feedback.textContent = "Comment submitted successfully!";
          feedback.style.color = "green";
          form.reset();
          fileInput.value = ""; // Clear file input
          mediaUrlInput.value = ""; // Clear media URL input

          if (!parentId) {
            commentsSection.innerHTML = ""; // Reload all comments
            loadComments();
          }
        } catch (error) {
          console.error("Error during comment submission:", error);
          feedback.textContent =
            "Failed to submit your comment. Please check your network and try again.";
          feedback.style.color = "red";
        } finally {
          setTimeout(() => {
            feedback.textContent = "";
          }, 3000);
        }
      };

      // Reply to Comment
      const replyToComment = (commentId, parentId) => {
        const replyForm = document.createElement("form");
        replyForm.innerHTML = `
          <input type="text" placeholder="Username" id="reply-username" required /><br />
          <input type="text" placeholder="Subject" id="reply-subject" required /><br />
          <textarea placeholder="Message" id="reply-message" required></textarea><br />
          <input type="file" id="reply-file-input" accept="image/*,video/*,audio/*" />
          <input type="url" id="reply-media-url" placeholder="https://example.com/image.jpg" />
          <button type="submit">Submit Reply</button>
        `;

        replyForm.onsubmit = async (e) => {
          e.preventDefault();
          const username = document.getElementById("reply-username").value.trim();
          const subject = document.getElementById("reply-subject").value.trim();
          const message = document.getElementById("reply-message").value.trim();
          const mediaUrl = document.getElementById("reply-media-url").value.trim();
          const file = document.getElementById("reply-file-input").files[0];

          // Validation for required fields
          if (!username || !subject || !message) {
            feedback.textContent = "All fields except media are required.";
            feedback.style.color = "red";
            setTimeout(() => (feedback.textContent = ""), 3000);
            return;
          }

          try {
            const commentKey = Date.now().toString();
            const newComment = {
              username,
              subject,
              message,
              mediaUrl,
              timestamp: firebase.database.ServerValue.TIMESTAMP,
            };

            if (file) {
              const client = new replit.object_storage.Client();
              const filename = file.name;
              const mediaFile = await client.upload(filename, file);
              newComment.mediaFile = mediaFile;
            }

            await database.ref(`comments/${parentId || commentId}/replies/${commentKey}`).set(newComment);

            feedback.textContent = "Reply submitted successfully!";
            feedback.style.color = "green";
            replyForm.reset();

            // Reload the replies section
            const repliesDiv = document.getElementById(`replies-${parentId || commentId}`);
            repliesDiv.innerHTML = "";
            loadComments(parentId || commentId);
          } catch (error) {
            console.error("Error during reply submission:", error);
            feedback.textContent =
              "Failed to submit your reply. Please check your network and try again.";
            feedback.style.color = "red";
          } finally {
            setTimeout(() => {
              feedback.textContent = "";
            }, 3000);
          }
        };

        const repliesDiv = document.getElementById(`replies-${commentId}`);
        repliesDiv.appendChild(replyForm);
      };

      // Initialize DOM and Attach Event Listeners
      document.addEventListener("DOMContentLoaded", () => {
        form = document.getElementById("comment-form");
        feedback = document.getElementById("feedback");
        commentsSection = document.getElementById("comments-section");
        loadMoreButton = document.getElementById("load-more");
        fileInput = document.getElementById("file-input");
        mediaUrlInput = document.getElementById("media-url");

        form.addEventListener("submit", (e) => submitComment(e));
        loadMoreButton.addEventListener("click", () => loadComments());

        loadComments();
      });
    </script>
    <style>
      body {
        font-family: "MS UI Gothic", sans-serif; /* Set font to MS UI Gothic */
      }

      .comment-username {
        font-weight: bold;
      }

      .comment-message {
        margin-bottom: 10px;
      }

      .comment-media {
        max-width: 100%;
        height: auto;
        margin-bottom: 10px;
      }

      .comment-media-download {
        display: block;
        margin-bottom: 10px;
      }

      .comment-reply-button {
        display: block;
        margin-top: 10px;
      }

      .replies {
        margin-left: 20px;
      }

      #comments-section {
        margin-top: 20px;
      }

      #comment-form {
        margin-bottom: 20px;
      }

      #load-more {
        display: block;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <h1>Say something...</h1>
    <h2>... from the heart. Please be kind!</h2>

    <!-- Comment submission form -->
    <form id="comment-form">
      <label for="username">Username:</label><br />
      <input type="text" id="username" required /><br /><br />
      <label for="subject">Subject:</label><br />
      <input type="text" id="subject" required /><br /><br />
      <label for="message">Message:</label><br />
      <textarea id="message" rows="5" cols="30" required></textarea><br /><br />
      <label for="media-url">Media URL (optional):</label><br />
      <input type="url" id="media-url" placeholder="https://example.com/image.jpg" /><br /><br />
      <label for="file-input">Upload File (optional):</label><br />
      <input type="file" id="file-input" accept="image/*,video/*,audio/*" /><br /><br />
      <button type="submit">Submit Comment</button>
    </form>

    <p id="feedback"></p>
    <div id="comments-section"></div>
    <button id="load-more">Load More</button>
  </body>
</html>
