<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Comments Section</title>
    <!-- Import Firebase libraries -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <script>
      // Firebase configuration
      const firebaseConfig = {
        apiKey: "AIzaSyCfrP-AaY1cGuj5zQ-ygPBp_SI0oT4zA7s",
        authDomain: "comments-ff6c9.firebaseapp.com",
        databaseURL: "https://comments-ff6c9-default-rtdb.firebaseio.com",
        projectId: "comments-ff6c9",
        storageBucket: "comments-ff6c9.appspot.com",
        messagingSenderId: "778548096311",
        appId: "1:778548096311:web:968b95a4fc97f13f21feb2",
        measurementId: "G-T8QFHWJDB5",
      };

      // Initialize Firebase
      firebase.initializeApp(firebaseConfig);
      const database = firebase.database();
      const storage = firebase.storage();

      // Global DOM Elements
      let form, feedback, commentsSection;

      // Load Comments from Firebase Database
      const loadComments = () => {
        const commentsRef = database.ref("comments");
        commentsRef.on("value", (snapshot) => {
          const comments = snapshot.val();

          // Clear comments section
          commentsSection.innerHTML = "";
          if (comments) {
            // Display each comment
            Object.keys(comments)
              .sort((a, b) => b - a) // Sort comments by timestamp
              .forEach((key) => {
                const comment = comments[key];
                commentsSection.innerHTML += `
                  <div>
                    <strong>${comment.username}</strong>: <em>${comment.subject}</em>
                    <p>${comment.message}</p>
                    ${
                      comment.imageUrl
                        ? `<img src="${comment.imageUrl}" alt="Comment Image" height="100" />`
                        : ""
                    }
                    <hr />
                  </div>`;
              });
          } else {
            commentsSection.innerHTML = "<p>No comments found.</p>";
          }
        });
      };

      // Submit Comment with Error Handling
      const submitComment = async (e) => {
        e.preventDefault();
        const username = document.getElementById("username").value.trim();
        const subject = document.getElementById("subject").value.trim();
        const message = document.getElementById("message").value.trim();
        const imageFile = document.getElementById("image").files[0];

        let imageUrl = "";
        try {
          // Validate file name and upload image
          if (imageFile) {
            const sanitizedFileName = imageFile.name.replace(/\s+/g, "_").toLowerCase();
            const imgRef = storage.ref(`images/${Date.now()}_${sanitizedFileName}`);
            const uploadTask = await imgRef.put(imageFile);
            imageUrl = await uploadTask.ref.getDownloadURL();
          }

          // Save comment to Firebase Database
          const commentKey = Date.now().toString();
          await database.ref(`comments/${commentKey}`).set({
            username,
            subject,
            message,
            imageUrl,
            timestamp: firebase.database.ServerValue.TIMESTAMP,
          });

          // Provide success feedback
          feedback.textContent = "Comment submitted successfully!";
          form.reset();
          loadComments(); // Refresh comments
        } catch (error) {
          console.error("Error during comment submission:", error);
          feedback.textContent =
            "Failed to submit your comment. Please check your network and try again.";
        } finally {
          // Clear feedback after a delay
          setTimeout(() => {
            feedback.textContent = "";
          }, 3000);
        }
      };

      // Initialize DOM and Attach Event Listeners
      document.addEventListener("DOMContentLoaded", () => {
        form = document.getElementById("comment-form");
        feedback = document.getElementById("feedback");
        commentsSection = document.getElementById("comments-section");

        // Attach event listener for form submission
        form.addEventListener("submit", submitComment);

        // Load existing comments
        loadComments();
      });
    </script>
  </head>
  <body>
    <h1>Say something...</h1>
    <h2>... from the heart. Please be kind!</h2>

    <!-- Comment submission form -->
    <form id="comment-form">
      <label for="username">Username:</label><br />
      <input type="text" id="username" required /><br /><br />
      <label for="subject">Subject:</label><br />
      <input type="text" id="subject" required /><br /><br />
      <label for="message">Message:</label><br />
      <textarea id="message" rows="5" cols="30" required></textarea><br /><br />
      <label for="image">Upload Image:</label><br />
      <input type="file" id="image" accept="image/*" /><br /><br />
      <button type="submit">Submit Comment</button>
    </form>

    <p id="feedback" style="color: green;"></p>
    <div id="comments-section"></div>
  </body>
</html>
