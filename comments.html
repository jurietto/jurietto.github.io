    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Comments Section</title>
    <!-- Import Firebase libraries -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        // Firebase configuration - Replace with your actual configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCfrP-AaY1cGuj5zQ-ygPBp_SI0oT4zA7s",
            authDomain: "comments-ff6c9.firebaseapp.com",
            databaseURL: "https://comments-ff6c9-default-rtdb.firebaseio.com",
            projectId: "comments-ff6c9",
            storageBucket: "comments-ff6c9.appspot.com",
            messagingSenderId: "778548096311",
            appId: "1:778548096311:web:968b95a4fc97f13f21feb2",
            measurementId: "G-T8QFHWJDB5"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Global DOM Elements
        let form, feedback, commentsSection, loadMoreButton, filterInput;
        const commentsPerPage = 5; // Number of comments to load per page
        let lastLoadedKey = null; // Key to track the last loaded comment
        let currentComments = []; // Array to hold current comments for filtering
        let loading = false; // Flag to prevent multiple loads

        // Function to Load Comments with Pagination
        const loadComments = (parentId = null) => {
            loading = true; // Set loading to true to prevent duplicate loads

            let commentsRef = database.ref("comments");
            if (parentId) {
                commentsRef = commentsRef.child(parentId).child("replies");
            }
            if (lastLoadedKey) {
                commentsRef = commentsRef.orderByKey().endBefore(lastLoadedKey);
            }
            commentsRef = commentsRef.limitToLast(commentsPerPage);

            commentsRef.once("value", (snapshot) => {
                const comments = snapshot.val();

                if (comments) {
                    lastLoadedKey = Object.keys(comments)[0]; // Store the last key for pagination

                    Object.entries(comments)
                        .reverse()
                        .forEach(([key, comment]) => {
                            currentComments.push({ key, comment }); // Keep for filtering
                            displayComment(key, comment, parentId);
                        });
                } else {
                    loadMoreButton.style.display = "none"; // Hide 'Load More' if no more comments
                }

                loading = false; // Reset loading flag after loading
            });
        };

        // Function to Display a Single Comment
        const displayComment = (key, comment, parentId = null) => {
            const commentDiv = document.createElement("div");
            commentDiv.setAttribute("data-id", key);
            commentDiv.innerHTML = `
                <strong>${comment.username}</strong> <small>(${new Date(comment.timestamp).toLocaleString()})</small>: <em>${comment.subject}</em>
                <p>${comment.message}</p>
                ${comment.mediaUrl ? `<img src="${comment.mediaUrl}" alt="Media" style="max-width: 100%; height: auto;" />` : ""}
                <button onclick="replyToComment('${key}', '${parentId || ""}')">Reply</button>
                <div class="replies" id="replies-${key}"></div>
                <hr />
            `;

            const container = parentId
                ? document.getElementById(`replies-${parentId}`)
                : commentsSection;
            container.prepend(commentDiv); // Add the comment to the top of the list
            
            // Load replies under this comment
            if (comment.replies) {
                Object.entries(comment.replies).forEach(([replyKey, reply]) => {
                    displayComment(replyKey, reply, key);
                });
            }
        };

        // Function to Submit Comment or Reply
        const submitComment = async (e, parentId = null) => {
            e.preventDefault(); // Prevent form submission
            const username = document.getElementById("username").value.trim();
            const subject = document.getElementById("subject").value.trim();
            const message = document.getElementById("message").value.trim();
            const mediaUrl = document.getElementById("media-url").value.trim();

            // Validation for required fields
            if (!username || !subject || !message) {
                feedback.textContent = "All fields except media URL are required.";
                feedback.style.color = "red";
                setTimeout(() => (feedback.textContent = ""), 3000);
                return; // Exit function execution on validation failure
            }

            try {
                const commentKey = Date.now().toString(); // Generate a unique key based on timestamp
                const newComment = {
                    username,
                    subject,
                    message,
                    mediaUrl,
                    timestamp: firebase.database.ServerValue.TIMESTAMP // Set server timestamp
                };

                // Save the comment or reply to the database
                if (parentId) {
                    await database.ref(`comments/${parentId}/replies/${commentKey}`).set(newComment);
                } else {
                    await database.ref(`comments/${commentKey}`).set(newComment);
                }

                // Notify user of success
                feedback.textContent = "Comment submitted successfully!";
                feedback.style.color = "green";
                form.reset(); // Reset form fields

                if (!parentId) {
                    commentsSection.innerHTML = ""; // Clear comments section
                    currentComments = []; // Reset comments for filtering
                    loadComments(); // Reload comments after submission
                }
            } catch (error) {
                console.error("Error during comment submission:", error);
                feedback.textContent =
                    "Failed to submit your comment. Please check your network and try again.";
                feedback.style.color = "red"; // Set error feedback color
            } finally {
                setTimeout(() => {
                    feedback.textContent = ""; // Clear feedback message after 3 seconds
                }, 3000);
            }
        };

        // Function to Reply to Comment
        const replyToComment = (commentId, parentId) => {
            const replyForm = document.createElement("form");
            replyForm.innerHTML = `
                <input type="text" placeholder="Username" id="reply-username" required /><br />
                <input type="text" placeholder="Subject" id="reply-subject" required /><br />
                <textarea placeholder="Message" id="reply-message" required></textarea><br />
                <button type="submit">Submit Reply</button>
            `;

            // Handle reply form submission
            replyForm.onsubmit = (e) =>
                submitComment(e, parentId || commentId); // Submit as reply or top-level comment

            const repliesDiv = document.getElementById(`replies-${commentId}`);
            repliesDiv.appendChild(replyForm); // Append reply form to the comment's replies section
        };

        // Function to Filter Comments by Subject
        const filterComments = () => {
            const filterText = filterInput.value.toLowerCase(); // Get user input for filtering
            commentsSection.innerHTML = ""; // Clear current comments display

            // Filter comments based on the subject
            currentComments
                .filter(({ comment }) => comment.subject.toLowerCase().includes(filterText))
                .forEach(({ key, comment }) => displayComment(key, comment)); // Display filtered results
        };

        // Initialize DOM and Attach Event Listeners
        document.addEventListener("DOMContentLoaded", () => {
            // Grab essential DOM elements
            form = document.getElementById("comment-form");
            feedback = document.getElementById("feedback");
            commentsSection = document.getElementById("comments-section");
            loadMoreButton = document.getElementById("load-more");
            filterInput = document.getElementById("filter-input");

            // Add event listeners to the form and buttons
            form.addEventListener("submit", (e) => submitComment(e)); // Attach submit event
            loadMoreButton.addEventListener("click", () => {
                if (!loading) { // Check if not already loading
                    loadComments();
                }
            });
            filterInput.addEventListener("input", filterComments); // Filter comments on input

            loadComments(); // Initial load of comments
        });
    </script>

<body>

    <h2>Share Your Thoughts and Feedback!</h2>

    <!-- Filter Comments by Subject Input -->
    <input type="text" id="filter-input" placeholder="Filter comments by subject..." />

    <!-- Comment submission form for new comments -->
    <form id="comment-form">
        <label for="username">Username:</label><br />
        <input type="text" id="username" required /><br /><br />
        <label for="subject">Subject:</label><br />
        <input type="text" id="subject" required /><br /><br />
        <label for="message">Message:</label><br />
        <textarea id="message" rows="5" cols="30" required></textarea><br /><br />
        <label for="media-url">Media URL (optional):</label><br />
        <input type="url" id="media-url" placeholder="https://example.com/image.jpg" /><br /><br />
        <button type="submit">Submit Comment</button>
    </form>

    <!-- Feedback area to show success or error messages -->
    <p id="feedback"></p>

    <!-- Section to display comments -->
    <div id="comments-section"></div>
