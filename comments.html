<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Comments Section</title>
    <!-- Import Firebase libraries -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <script>
      // Your web app's Firebase configuration
      const firebaseConfig = {
        apiKey: "AIzaSyCfrP-AaY1cGuj5zQ-ygPBp_SI0oT4zA7s",
        authDomain: "comments-ff6c9.firebaseapp.com",
        databaseURL: "https://comments-ff6c9-default-rtdb.firebaseio.com",
        projectId: "comments-ff6c9",
        storageBucket: "comments-ff6c9.appspot.com",
        messagingSenderId: "778548096311",
        appId: "1:778548096311:web:968b95a4fc97f13f21feb2",
        measurementId: "G-T8QFHWJDB5",
      };

      // Initialize Firebase
      firebase.initializeApp(firebaseConfig);
      const database = firebase.database();
      const storage = firebase.storage();

      // DOM Elements (moved inside DOMContentLoaded)
      let form;
      let feedback;
      let commentsSection;

      // Load Comments
      const loadComments = () => {
        const commentsRef = database.ref("comments");
        commentsRef.on("value", (snapshot) => {
          const comments = snapshot.val();

          // Check if there are comments before clearing the section
          if (comments) {
            commentsSection.innerHTML = ""; // Clear previous comments
            Object.keys(comments)
              .sort((a, b) => b - a) // Sort by timestamp (newest first)
              .forEach((key) => {
                const comment = comments[key];
                commentsSection.innerHTML += `
                              <div>
                                  <strong>${comment.username}</strong>: <em>${comment.subject}</em>
                                  <p>${comment.message}</p>
                                  ${
                                    comment.imageUrl
                                      ? `<img src="${comment.imageUrl}" alt="Comment Image" height="100"/>`
                                      : ""
                                  }
                                  <hr>
                              </div>`;
              });
          } else {
            commentsSection.innerHTML = "<p>No comments found.</p>";
          }
        });
      };

      // Submit Comment
      const submitComment = async (e) => {
        e.preventDefault();
        const username = document.getElementById("username").value.trim();
        const subject = document.getElementById("subject").value.trim();
        const message = document.getElementById("message").value.trim();
        const imageFile = document.getElementById("image").files[0];

        let imageUrl = "";

        // Upload image to Firebase Storage
        if (imageFile) {
          const imgRef = storage.ref(`images/${Date.now()}_${imageFile.name}`);
          await imgRef.put(imageFile);
          imageUrl = await imgRef.getDownloadURL();
        }

        // Store comment in Firebase Database
        const commentKey = Date.now().toString();
        await database.ref(`comments/${commentKey}`).set({
          username,
          subject,
          message,
          imageUrl,
          timestamp: firebase.database.ServerValue.TIMESTAMP,
        });

        feedback.textContent = "Comment submitted successfully!";
        form.reset();
        loadComments(); // Refresh comments
        setTimeout(() => {
          feedback.textContent = ""; // Clear feedback message
        }, 3000);
      };

      // DOMContentLoaded Event Listener
      document.addEventListener("DOMContentLoaded", () => {
        // Get DOM Elements
        form = document.getElementById("comment-form");
        feedback = document.getElementById("feedback");
        commentsSection = document.getElementById("comments-section");

        // Attach Event Listener to the Form
        form.addEventListener("submit", submitComment);

        // Initial Load
        loadComments();
      });
    </script>
  </head>
  <body>
    <h1>Say something...</h1>
    <h2>... from the heart. Please be kind!</h2>

    <!-- Form for submitting comments -->
    <form id="comment-form">
      <label for="username">Username:</label><br />
      <input type="text" id="username" required /><br /><br />
      <label for="subject">Subject:</label><br />
      <input type="text" id="subject" required /><br /><br />
      <label for="message">Message:</label><br />
      <textarea id="message" rows="5" cols="30" required></textarea><br /><br />
      <label for="image">Upload Image:</label><br />
      <input type="file" id="image" /><br /><br />
      <button type="submit">Submit Comment</button>
    </form>

    <p id="feedback"></p>
    <div id="comments-section"></div>
  </body>
</html>
