<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comments Section</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* General Styles */
        section {
            margin: 20px auto;
            max-width: 800px;
            padding: 20px;

        }

        section h2 {
            font-size: 1.8em;
            margin-bottom: 15px;
            color: #f5f5f5;
        }

        form label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #f5f5f5;
        }

        form input, form textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        form input[type="submit"] {
            width: 100%;
            background-color: #FF0099;
            color: white;
            border: none;
            cursor: pointer;
        }

        form input[type="submit"]:hover {
            background-color: #FF0099;
        }

        #comments-list {
            list-style-type: none;
            padding: 0;
        }

        #comments-list li {
            margin-bottom: 20px;
            padding: 10px;
            border: 1px solid #444;
            border-radius: 5px;
            background-color: #3e3e50;
            color: #f5f5f5;
        }

        #comments-list img {
            max-width: 100%;
            height: auto;
            margin-top: 10px;
            border-radius: 5px;
        }

    </style>
</head>
<body>
    <header>
             <!-- Decorative Image -->
    <img 
    style="-moz-transform: rotate(-5deg); -webkit-transform: rotate(-5deg); -o-transform: rotate(-5deg); -ms-transform: rotate(-5deg); transform: rotate(-5deg); border-width: 1px; border-style: solid;" 
    src="https://file.garden/ZhTgSjrp5nAroRKq/2013-08-15_00026.jpg" 
    alt="Decorative Image" 
    width="200" 
    height="150" 
/>
        <h1>Comments</h1>

   
    </header>

    <!-- Comment Form Section -->
    <section id="respond">
        <h2>Share your thoughts and upload media!</h2>
        <form id="add-comment">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="Your Name" required>

            <label for="comment">Comment:</label>
            <textarea id="comment" name="comment" placeholder="Write your comment here..." required></textarea>

            <label for="media">Upload Media (optional):</label>
            <input type="file" id="media" name="media" accept="image/*,video/*">

            <input type="submit" value="Post Comment">
        </form>
    </section>

    <!-- Comments List Section -->
    <section id="comments">
        <h2>Comments</h2>
        <ol id="comments-list">
            <p>Loading comments...</p>
        </ol>
    </section>

   <!-- Home Button -->
<a href="index.html">
    <img 
        id="home-button" 
        src="https://file.garden/ZhTgSjrp5nAroRKq/cooltext473430399612799.gif" 
        alt="Home Button" 
        class="home-button" 
        title="Go Home"
    />
</a>
    
    <!-- Audio Control -->
    <img 
        id="audio-control" 
        src="https://file.garden/ZhTgSjrp5nAroRKq/496.gif" 
        alt="Audio Control" 
        class="audio-control" 
        title="Play Music"
    />

    <footer>
        <h6>&copy; 2024 - ???</h6>
    </footer>

    <!-- Include External JavaScript -->
    <script src="scripts.js"></script>
</body>
</html>
