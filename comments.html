<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comments System</title>
    <style>
        /* Reset Styles */
        body, h1, h2, h3, p, ul, li, textarea, input, button {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            padding: 20px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        #comments-section {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            margin: 0 auto;
        }
        #comments-list {
            list-style-type: none;
            margin-bottom: 20px;
        }
        #comments-list li {
            padding: 10px;
            margin-bottom: 10px;
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        #comments-list li:nth-child(even) {
            background: #efefef;
        }
        #add-comment {
            display: flex;
            flex-direction: column;
        }
        #add-comment label {
            margin-bottom: 5px;
            font-weight: bold;
        }
        #add-comment input, #add-comment textarea {
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        #add-comment button {
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #add-comment button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div id="comments-section">
        <h1>Comments</h1>
        <ul id="comments-list">
            <!-- Example Comments -->
            <li>
                <p><strong>Jane Doe:</strong> Great content! Love it!</p>
            </li>
            <li>
                <p><strong>John Smith:</strong> Thanks for sharing this amazing post.</p>
            </li>
        </ul>
        <form id="add-comment" action="post_comment.php" method="post">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Your name" required>
            <label for="comment">Comment</label>
            <textarea id="comment" name="comment" rows="4" placeholder="Write your comment here..." required></textarea>
            <button type="submit">Post Comment</button>
        </form>
    </div>
</body>
</html>

</html>
