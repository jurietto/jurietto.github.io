<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comments Page</title>
    <link rel="stylesheet" href="style.css">
    <style>

        form {
            margin: 20px auto;
            padding: 15px;
            width: 90%;
            max-width: 600px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        label {
            display: block;
            margin: 10px 0 5px;
            color: #333;
            font-weight: bold;
        }

        input, textarea, input[type="submit"], input[type="file"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            box-sizing: border-box;
        }

        textarea {
            resize: none;
            height: 100px;
        }

        input[type="submit"] {
            background-color: #FF0099;
            color: white;
            font-size: 1.2em;
            border: none;
            cursor: pointer;
            text-shadow: 2px 2px 4px #000000;
        }

        input[type="submit"]:hover {
            background-color: #FF33AA;
        }

        /* Comments Section Styling */
        #comments h2 {
            font-family: 'Arial', sans-serif;
            font-size: 2.5em;
            color: #FF0099;
            text-shadow: 2px 2px 4px #000000;
            margin-bottom: 10px;
            text-align: center;
        }

        #comments-list {
            list-style: none;
            padding: 0;
            margin: 20px auto;
            width: 90%;
            max-width: 600px;
        }

        #comments-list li {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #FF0099;
            border-radius: 5px;
            margin-bottom: 15px;
            padding: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        #comments-list blockquote {
            margin: 0;
            font-style: italic;
            color: #555;
        }

        #comments-list footer {
            text-align: right;
            font-size: 0.9em;
            color: #FF0099;
        }
    </style>
</head>
<body>
    <!-- Decorative Image -->
    <img 
        style="transform: rotate(-5deg); border: 1px solid;" 
        src="https://file.garden/ZhTgSjrp5nAroRKq/Ggjhqk2XoAA9gZu.jpg" 
        alt="Decorative Image" 
        width="200" 
        height="150" 
    />

    <!-- Page Heading -->
    <h1>Comments Page</h1>

    <!-- Form Section -->
    <section id="respond">
        <h2>Leave a Comment</h2>
        <form id="add-comment">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="Your Name" required>

            <label for="comment">Comment:</label>
            <textarea id="comment" name="comment" placeholder="Write your comment here..." required></textarea>

            <label for="media">Upload Media (optional):</label>
            <input type="file" id="media" name="media" accept="image/*,video/*">

            <input type="submit" value="Post Comment">
        </form>
    </section>

    <!-- Comments Section -->
    <section id="comments">
        <h2>Comments</h2>
        <ol id="comments-list"></ol>
    </section>

    <!-- Footer -->
    <footer>
        <h6>2024 - ???</h6>
    </footer>

    <script type="module" src="scripts.js"></script>
</body>
</html>
