<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comments Page</title>
    <link rel="stylesheet" href="style.css">
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Play audio when the page loads
            const navSound = new Audio("https://file.garden/ZhTgSjrp5nAroRKq/scream-with-echo-46585.mp3");
            navSound.play();
        });
    </script>
</head>
<body>
    <!-- Decorative Image -->
    <img 
        style="-moz-transform: rotate(-5deg); -webkit-transform: rotate(-5deg); -o-transform: rotate(-5deg); -ms-transform: rotate(-5deg); transform: rotate(-5deg); border-width: 1px; border-style: solid;" 
        src="https://file.garden/ZhTgSjrp5nAroRKq/Ggjhqk2XoAA9gZu.jpg" 
        alt="Decorative Image" 
        width="200" 
        height="150" 
    />

    <!-- Page Heading -->
    <h1>Comments Page</h1>

    <!-- Form Section -->
    <section id="respond">
        <h2>Leave a Comment</h2>
        <form id="add-comment">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="Your Name" required>

            <label for="comment">Comment:</label>
            <textarea id="comment" name="comment" placeholder="Write your comment here..." required></textarea>

            <label for="media">Upload Media (optional):</label>
            <input type="file" id="media" name="media" accept="image/*,video/*">

            <input type="submit" value="Post Comment">
        </form>
    </section>

    <!-- Comments Section -->
    <section id="comments">
        <h2>Comments</h2>
        <ol id="comments-list">
            <!-- Placeholder comments -->
            <li>
                <blockquote>
                    <p>This is a great example of a comment system!</p>
                    <footer>— Jane Doe</footer>
                </blockquote>
            </li>
            <li>
                <blockquote>
                    <p>I love the clean design and functionality.</p>
                    <footer>— John Smith</footer>
                </blockquote>
            </li>
            <li>
                <blockquote>
                    <p>Looking forward to seeing more updates!</p>
                    <footer>— Alex Brown</footer>
                </blockquote>
            </li>
        </ol>

        <!-- Pagination -->
        <div class="pagination">
            <button id="prev-page" disabled>Previous</button>
            <button id="next-page">Next</button>
        </div>
    </section>

    <!-- Home Button -->
    <a href="index.html">
        <img 
            id="home-button" 
            src="https://file.garden/ZhTgSjrp5nAroRKq/cooltext473430399612799.gif" 
            alt="Home Button" 
            class="home-button" 
            title="Go Home"
        />
    </a>
    
    <!-- Audio Control -->
    <img 
        id="audio-control" 
        src="https://file.garden/ZhTgSjrp5nAroRKq/496.gif" 
        alt="Audio Control" 
        class="audio-control" 
        title="Play Music"
    />
    
    <footer>
        <h6>&copy; 2024 - ???</h6>
    </footer>

    <!-- Include External JavaScript -->
    <script src="scripts.js"></script>
</body>
</html>
