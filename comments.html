<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comments Page</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* General Body Styling */
        body {
            font-family: 'MS Gothic', sans-serif;
            background-color: black;
            background-image: url('https://file.garden/ZhTgSjrp5nAroRKq/bloods.png');
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            background-size: contain;
            color: white;
            max-width: 500px;
            margin: 20px auto;
            line-height: 1.6;
            padding: 20px;
            text-align: justify;
            text-shadow: 
                2px 2px 4px #000000, 
                3px 3px 6px #000000, 
                1px 1px 2px #000000;
        }

        /* Form and Inputs Styling */
        #respond h2, #comments h2 {
            font-family: 'Lindley', sans-serif;
            font-size: 2.5em;
            color: #FF0099;
            text-shadow: 
                2px 2px 4px #000000, 
                3px 3px 6px #000000, 
                1px 1px 2px #000000;
        }

        form {
            margin-bottom: 30px;
        }

        label {
            display: block;
            margin: 10px 0 5px;
            font-family: 'MS UI Gothic', sans-serif;
            font-size: 1.2em;
            font-weight: bold;
            color: white;
        }

        input, textarea, input[type="submit"] {
            width: 100%; /* Ensures consistent width for all inputs and button */
            box-sizing: border-box; /* Includes padding and border in width calculation */
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: 'MS UI Gothic', sans-serif;
            font-size: 1em;
        }

        textarea {
            resize: none; /* Disable resizing */
            height: 100px; /* Fixed height for comment box */
        }

        input[type="submit"] {
            background-color: #FF0099;
            color: white;
            font-size: 1.2em;
            border: none;
            cursor: pointer;
            text-shadow: 2px 2px 4px #000000;
        }

        input[type="submit"]:hover {
            background-color: #FF33AA;
        }

        /* Comments Section Styling */
        #comments-list {
            list-style: none;
            padding: 0;
        }

        #comments-list li {
            background: rgba(0, 0, 0, 0.7); /* Transparent black */
            border: 1px solid #FF0099;
            border-radius: 5px;
            margin-bottom: 15px;
            padding: 10px;
        }

        #comments-list blockquote {
            margin: 0;
            font-style: italic;
        }

        #comments-list footer {
            text-align: right;
            font-size: 0.9em;
            color: #FF0099;
        }

        /* Footer */
        footer {
            text-align: center;
            margin-top: 40px;
            font-size: 0.9em;
            color: #FF0099;
            text-shadow: 
                2px 2px 4px #000000, 
                3px 3px 6px #000000, 
                1px 1px 2px #000000;
        }
    </style>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const navSound = new Audio("https://file.garden/ZhTgSjrp5nAroRKq/scream-with-echo-46585.mp3");
            navSound.play();
        });
    </script>
</head>
<body>
    <!-- Decorative Image -->
    <img 
        style="transform: rotate(-5deg); border: 1px solid;" 
        src="https://file.garden/ZhTgSjrp5nAroRKq/2013-08-15_00026.jpg" 
        alt="Decorative Image" 
        width="200" 
        height="150" 
    />

    <!-- Home Button -->
    <a href="index.html">
        <img 
            id="home-button" 
            src="https://file.garden/ZhTgSjrp5nAroRKq/cooltext473430399612799.gif" 
            alt="Home Button" 
            title="Go Home"
        />
    </a>

    <!-- Audio Control -->
    <img 
        id="audio-control" 
        src="https://file.garden/ZhTgSjrp5nAroRKq/496.gif" 
        alt="Audio Control" 
        title="Play Music"
    />

    <!-- Page Heading -->
    <h1>Comments Page</h1>

    <!-- Form Section -->
    <section id="respond">
        <h2>Leave a Comment</h2>
        <form id="add-comment" action="post_comment.php" method="post">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="Your Name" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Your Email" required>

            <label for="comment">Comment:</label>
            <textarea id="comment" name="comment" placeholder="Write your comment here..." required></textarea>

            <input type="submit" value="Post Comment">
        </form>
    </section>

    <!-- Comments Section -->
    <section id="comments">
        <h2>Comments</h2>
        <ol id="comments-list">
            <li>
                <blockquote>
                    <p>Great content! Love the design!</p>
                    <footer>— Jane Doe</footer>
                </blockquote>
            </li>
            <li>
                <blockquote>
                    <p>Looking forward to more posts like this.</p>
                    <footer>— John Smith</footer>
                </blockquote>
            </li>
        </ol>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2024 - ??? | All Rights Reserved</p>
    </footer>
</body>
</html>
