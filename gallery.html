<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juri's Stuff - About Me</title>

    <!-- Firebase App, Database, and Storage libraries -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="style.css">

    <style>
        /* Gallery container style */
        .gallery {
            display: flex;
            flex-wrap: wrap; /* Allow items to wrap on small screens */
            gap: 20px; /* Space between images */
            margin: 20px 0; /* Margin for top and bottom */
            justify-content: center;
        }

        .gallery-item {
            width: 100%; /* Full width for each gallery item */
            display: flex; /* Flex container for image and text */
            flex-direction: column;
            align-items: center; /* Center the content */
            margin-bottom: 20px; /* Space between items */
            user-select: none; /* Prevent text selection */
        }

        .gallery-item img {
            width: 100%; /* Make photos 100% in width */
            height: auto; /* Maintain aspect ratio */
            border: 1px solid #FF0099; /* Border for images */
            border-radius: 5px; /* Rounded corners */
            pointer-events: none; /* Disable interactions */
        }

        .caption {
            color: white; /* Caption text color */
            text-align: center; /* Center caption text */
            font-size: 14px; /* Caption text size */
            margin-top: 5px; /* Margin above caption */
        }

        .divider {
            width: 20px; /* Set width for divider image */
            height: 20px; /* Set height for divider image */
            border: none; /* No border for divider image */
            margin: 10px 0;
            display: block; /* Ensure it's displayed as a block element */
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
        }

        .pagination button {
            margin: 0 5px;
            padding: 5px 10px;
            cursor: pointer;
            background-color: #FF0099; /* Set background color to #FF0099 */
            color: white;
            border: none;
            border-radius: 5px;
            user-select: none; /* Prevent text selection */
        }

        .pagination button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }
    </style>

</head>

<body>
    <img 
        style="transform: rotate(-5deg); border: 1px solid;" 
        src="https://file.garden/ZhTgSjrp5nAroRKq/Ggjhqk2XoAA9gZu.jpg" 
        alt="Decorative Image" 
        width="200" 
        height="150" 
    />

    <h1>Gallery</h1>

    <!-- Search and Sort UI -->
    <div>
        <input type="text" id="search" placeholder="Search..." oninput="loadImages()">
        <select id="sort" onchange="loadImages()">
            <option value="asc">Sort by Oldest</option>
            <option value="desc">Sort by Newest</option>
        </select>
    </div>
    
    <div class="gallery" id="gallery"></div> <!-- Container for the gallery images -->

    <!-- Pagination -->
    <div class="pagination" id="pagination">
        <button id="prev" onclick="changePage(-1)">&#60; Prev</button>
        <span id="page-numbers"></span>
        <button id="next" onclick="changePage(1)">Next &#62;</button>
    </div>

    <a href="index.html">
        <img id="home-button" class="home-button" title="Go Home" src="https://file.garden/ZhTgSjrp5nAroRKq/cooltext473430399612799.gif" alt="Home Button" />
    </a>

    <footer>
        <h6>2024 - ???</h6>
    </footer>
    
</body>

</html>
