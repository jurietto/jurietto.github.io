<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juri's Stuff - About Me</title>

    <!-- Firebase App, Database, and Storage libraries -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="styles.css">

</head>

<body>

    <h1>Gallery</h1>

    <!-- Search and Sort UI -->
    <div>
        <input type="text" id="search" placeholder="Search..." oninput="loadImages()">
        <select id="sort" onchange="loadImages()">
            <option value="asc">Sort by Oldest</option>
            <option value="desc">Sort by Newest</option>
            <option value="shuffle">Shuffle</option>
        </select>
    </div>
    
    <div class="gallery" id="gallery"></div> <!-- Container for the gallery images -->

    <!-- Pagination --> 
    <div class="pagination" id="pagination">
        <button id="prev" onclick="changePage(-1)">&#60; Prev</button>
        <span id="page-numbers"></span>
        <button id="next" onclick="changePage(1)">Next &#62;</button>
    </div>

    <!-- Include the external JavaScript file -->
    <script src="gallery.js"></script>

    <footer>
        <h6>2024 - ???</h6>
    </footer>
    
</body>

</html>
