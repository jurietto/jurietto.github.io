<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Style-Type" content="text/css">
    <meta name="format-detection" content="telephone=no">
    <title>Juri's Stuff - Gallery</title>

    <link rel="stylesheet" href="https://file.garden/ZhTgSjrp5nAroRKq/apple-chancery.ttf" type="font/ttf" />

    <style>
        @font-face {
            font-family: 'Apple Chancery';
            src: url('https://file.garden/ZhTgSjrp5nAroRKq/apple-chancery.ttf');
        }

        body {
            font-family: 'Apple Chancery', serif;
            background-color: black;
            background-image: url('https://file.garden/ZhTgSjrp5nAroRKq/bloods.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            background-attachment: fixed;
            color: white;
            line-height: 1.6;
            width: 90%;
            max-width: 700px; 
            margin: 0 auto; 
            padding: 10px;
            position: relative; 
            text-align: left;
        }

        h1, h2, h3, h4, h5, nav a, p, input[type="text"], select, button {
            text-shadow: none;
        }

        header {
            position: relative; 
            height: 200px; 
            margin-bottom: 40px;
            padding: 0 10px;
            text-align: center;
        }

        .title-container {
            max-width: 100%;
        }

        .title-container h1 {
            margin: 0; 
            font-family: 'Apple Chancery';
            font-size: 3rem;
        }

        nav {
            margin-top: 15px; 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            align-items: center; 
            padding: 10px 0; 
        }

        nav a {
            color: white;
            text-decoration: none; 
            margin: 0 10px; 
            font-family: 'Apple Chancery'; 
        }

        .separator {
            color: white; 
            margin: 0 5px;
            font-family: serif;
            -webkit-font-feature-settings: "liga" 0;
            font-feature-settings: "liga" 0;
            -webkit-font-variant-ligatures: none;
            font-variant-ligatures: none;
            text-shadow: 
                0 0 10px rgba(255, 0, 0, 1),
                0 0 20px rgba(255, 0, 0, 1),
                0 0 30px rgba(255, 0, 0, 1);
        }

        nav a:hover {
            color: #ff007b;
        }

        main {
            text-align: justify; 
            padding: 0 20px;
        }

        h2 {
            margin: 20px 0; 
            text-align: center; 
        }

        .divider {
            background-image: url('https://enchantingcastle.com/gifs%20&%20pixel%20art/dividers/84.gif');
            height: 24px; 
            background-repeat: repeat-x; 
            border: none; 
            margin: 15px 0; 
            width: 100%; 
            display: block; 
        }

        .search-sort-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px auto;
            width: 100%;
            gap: 20px;
            max-width: 600px;
            padding: 0 20px;
            box-sizing: border-box;
            font-family: 'MS UI Gothic', sans-serif;
        }

        input[type="text"], 
        select {
            padding: 8px 15px;
            margin: 0;
            font-size: 0.9rem;
            background-color: black;
            color: white;
            border: 1px solid white;
            text-shadow: none;
            box-sizing: border-box;
            width: 200px;
            border-radius: 5px;
        }

        .gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin: 20px 0;
        }

        .gallery-item {
            position: relative; 
            padding: 10px; 
            border: 1px solid white; 
            background: rgba(0, 0, 0, 0.7); 
            border-radius: 10px; 
            width: calc(33.333% - 20px); /* Three items per row with 20px gap */
            box-sizing: border-box;
            overflow: hidden;
            z-index: 1;
            cursor: pointer;
            text-align: center;
        }

        .gallery-item img {
            width: 100%;
            border-radius: 10px;
            transition: transform 0.3s, border-color 0.3s;
        }

        .gallery-item img:hover {
            transform: scale(1.05);
            border-color: white;
        }

        .gallery-item h2 {
            font-size: 1.2rem;
            margin: 10px 0 5px;
        }

        .gallery-item .date,
        .gallery-item .caption {
            font-family: 'MS UI Gothic', sans-serif;
            margin: 5px 0;
        }

        .symbol-divider {
            text-align: center; 
            margin: 15px 0; 
            font-size: 3rem; 
            color: white;
            font-family: serif;
            -webkit-font-feature-settings: "liga" 0;
            font-feature-settings: "liga" 0;
            -webkit-font-variant-ligatures: none;
            font-variant-ligatures: none;
            text-shadow: 
                0 0 10px rgba(255, 0, 0, 1),
                0 0 20px rgba(255, 0, 0, 1),
                0 0 30px rgba(255, 0, 0, 1);
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px auto;
            gap: 10px;
            width: 100%;
            max-width: 600px;
            padding: 0 20px;
            box-sizing: border-box;
            font-family: 'MS UI Gothic', sans-serif;
        }

        #page-numbers {
            display: flex;
            gap: 5px;
        }

        button {
            background-color: black;
            border: 1px solid white;
            padding: 8px 15px;
            margin: 0;
            font-size: 0.9rem;
            cursor: pointer;
            color: white;
            font-family: 'MS UI Gothic', sans-serif;
            text-shadow: none;
            border-radius: 5px;
            min-width: 40px;
        }

        button.active {
            background-color: rgba(255, 255, 255, 0.2);
        }

        button:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        footer {
            text-align: center; 
            font-family: 'MS UI Gothic', sans-serif; 
            font-size: 1rem; 
            padding: 20px 0; 
        }
        .fireworks-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            pointer-events: none;
            z-index: -1; /* Place behind other content */
        }

        .firework-particle {
            position: absolute;
            font-size: 48px; /* Increase size of the particles */
            animation: fireworks 1s forwards;
        }

        @keyframes fireworks {
            0% {
            transform: translate(0) scale(1);
            opacity: 1;
        }
            100% {
            transform: translate(var(--translateX), var(--translateY)) scale(0);
            opacity: 0;
            }
        }

        @media (max-width: 600px) {
            body {
                width: 95%;
            }

            .title-container h1 {
                font-size: 2rem; 
            }

            .search-sort-container {
                flex-direction: column;
                padding: 0 10px;
                gap: 10px;
            }

            input[type="text"], 
            select {
                width: 100%;
            }

            .gallery-item {
                padding: 15px;
                width: 100%; /* Single item per row */
            }

            .symbol-divider {
                font-size: 2rem;
            }

            .pagination {
                flex-wrap: wrap;
                gap: 5px;
            }

            button {
                padding: 6px 12px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="title-container">
            <h1>Juri's Stuff</h1>
            <nav>
                <a href="index.html">Home</a>
                <span class="separator">&#9829;</span>
                <a href="about.html">About</a>
                <span class="separator">&#9733;</span>
                <a href="gallery.html">Gallery</a>
                <span class="separator">&#9819;"></span>
                <a href="updates.html">Updates</a>
                <span class="separator">&#9827;"></span>
                <a href="visual-novels.html">Visual Novels</a>
                <span class="separator">&#9830;"></span>
                <a href="music.html">Music</a>
                <span class="separator">&#9824;"></span>
                <a href="art.html">Art</a>
                <span class="separator">&#9829;"></span>
                <a href="twitter.html">Twitter</a>
                <span class="separator">&#9827;"></span>
                <a href="bluesky.html">Bluesky</a>
                <span class="separator">&#9827;"></span>
                <a href="youtube.html">YouTube</a>
                <span class="separator">&#9733;"></span>
                <a href="soundcloud.html">SoundCloud</a>
                <span class="separator">&#9834;"></span>
                <a href="vndb.html">VNDB</a>
            </nav>
        </div>
    </header>

    <main>
        <h2>GALLERY</h2>
        <div class="divider"></div>
        
        <div class="search-sort-container">
            <input type="text" id="search" placeholder="Search... (type here)" oninput="loadImages()">
            <select id="sort" onchange="loadImages()">
                <option value="desc">Sort by Newest</option>
                <option value="asc">Sort by Oldest</option>
                <option value="shuffle">Shuffle</option>
            </select>
        </div>

        <div id="gallery" class="gallery"></div>

        <div class="pagination" id="pagination">
            <button id="prev" onclick="changePage(-1)">Prev</button>
            <span id="page-numbers"></span>
            <button id="next" onclick="changePage(1)">Next</button>
        </div>
    </main>

    <footer>
        <h6>2024 - ???</h6>
    </footer>

    <div class="fireworks-container"></div>

    <!-- Firebase App (the core Firebase SDK) is always required and must be listed first -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="gallery.js"></script>
</body>
</html>
