<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juri's Stuff - About Me</title>

    <!-- Firebase App, Database, and Storage libraries -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="style.css">

    <style>
        /* Apply full screen background image */
        body {
            background-image: url('https://file.garden/ZhTgSjrp5nAroRKq/321354');
            background-size: cover; /* Make background image cover */
            background-position: center; /* Center the image */
            background-repeat: no-repeat; /* Do not repeat image */
        }

        /* Remove background image on mobile devices */
        @media (max-width: 768px) {
            body {
                background-image: none;
            }
        }

        /* Gallery container style */
        .gallery {
            display: flex;
            flex-wrap: wrap; /* Allow items to wrap on small screens */
            gap: 10px; /* Space between images */
            margin: 20px 0; /* Margin for top and bottom */
        }

        .gallery-item {
            width: 100%; /* Full width for each gallery item */
            display: flex; /* Flex container for image and text */
            flex-direction: column;
            align-items: center; /* Center the content */
            margin-bottom: 20px; /* Space between items */
        }

        .gallery img {
            width: 100%; /* Make photos 100% in width */
            height: auto; /* Maintain aspect ratio */
            border: 5px solid; /* Border for images */
            border-image-slice: 1;
            border-image-source: linear-gradient(45deg, red, orange, yellow, green, blue, indigo, violet); /* Rainbow gradient border */
            border-radius: 5px; /* Optional: rounded corners */
        }

        .caption {
            color: white; /* Caption text color */
            text-align: center; /* Center caption text */
            font-size: 14px; /* Caption text size */
            margin-top: 5px; /* Margin above caption */
        }

        .meta {
            color: lightgray; /* Metadata text color */
            text-align: center; /* Center metadata text */
            font-size: 12px; /* Metadata text size */
        }

        /* Pagination styles */
        .pagination {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }

        .pagination button {
            margin: 0 5px;
            padding: 5px 10px;
            cursor: pointer;
        }
    </style>

</head>

<body>
    <img 
        style="transform: rotate(-5deg); border: 1px solid;" 
        src="https://file.garden/ZhTgSjrp5nAroRKq/Ggjhqk2XoAA9gZu.jpg" 
        alt="Decorative Image" 
        width="200" 
        height="150" 
    />

    <h1>Gallery</h1>

    <!-- Search and Sort UI -->
    <div>
        <input type="text" id="search" placeholder="Search..." oninput="loadImages()">
        <select id="sort" onchange="loadImages()">
            <option value="asc">Sort by Oldest</option>
            <option value="desc">Sort by Newest</option>
        </select>
    </div>
    
    <div class="gallery" id="gallery"></div> <!-- Container for the gallery images -->

    <!-- Pagination -->
    <div class="pagination" id="pagination"></div>

    <script>
        // Your Firebase configuration object
        const firebaseConfig = {
            apiKey: "AIzaSyCfrP-AaY1cGuj5zQ-ygPBp_SI0oT4zA7s",
            authDomain: "comments-ff6c9.firebaseapp.com",
            databaseURL: "https://comments-ff6c9-default-rtdb.firebaseio.com",
            projectId: "comments-ff6c9",
            storageBucket: "comments-ff6c9.appspot.com",
            messagingSenderId: "778548096311",
            appId: "1:778548096311:web:968b95a4fc97f13f21feb2",
            measurementId: "G-T8QFHWJDB5"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();  // Initialize the Database service

        let currentPage = 1;
        const itemsPerPage = 5;

        // Function to fetch images and captions from Firebase Realtime Database
        function loadImages() {
            const searchQuery = document.getElementById('search').value.toLowerCase();
            const sortOrder = document.getElementById('sort').value;

            database.ref('gallery').orderByChild('timestamp').once('value', (snapshot) => {
                let items = [];
                snapshot.forEach((childSnapshot) => {
                    const imageData = childSnapshot.val();
                    if (!searchQuery || imageData.text.toLowerCase().includes(searchQuery)) {
                        items.push({ key: childSnapshot.key, ...imageData });
                    }
                });

                // Sort items
                if (sortOrder === 'desc') {
                    items.reverse();
                }

                // Pagination logic
                const totalPages = Math.ceil(items.length / itemsPerPage);
                const start = (currentPage - 1) * itemsPerPage;
                const end = start + itemsPerPage;
                const paginatedItems = items.slice(start, end);

                // Display items
                displayItems(paginatedItems);

                // Display pagination
                displayPagination(totalPages);
            }, (error) => {
                console.error("Error fetching data: ", error);
            });
        }

        function displayItems(items) {
            const galleryElement = document.getElementById('gallery');
            galleryElement.innerHTML = ''; // Clear previous images

            items.forEach((item) => {
                const galleryItem = document.createElement('div');
                galleryItem.className = 'gallery-item';

                const titleElement = document.createElement('h2');
                titleElement.textContent = item.key;
                galleryItem.appendChild(titleElement);

                const img = document.createElement('img');
                img.src = item.url;
                img.alt = item.text;
                galleryItem.appendChild(img);

                const captionElement = document.createElement('p');
                captionElement.className = 'caption';
                captionElement.textContent = item.text;
                galleryItem.appendChild(captionElement);

                const metaElement = document.createElement('p');
                metaElement.className = 'meta';
                const date = new Date(item.timestamp);
                metaElement.textContent = `Uploaded on ${date.toLocaleDateString()}`;
                galleryItem.appendChild(metaElement);

                galleryElement.appendChild(galleryItem);
            });
        }

        function displayPagination(totalPages) {
            const paginationElement = document.getElementById('pagination');
            paginationElement.innerHTML = ''; // Clear previous pagination

            for (let i = 1; i <= totalPages; i++) {
                const button = document.createElement('button');
                button.textContent = i;
                button.className = i === currentPage ? 'active' : '';
                button.onclick = () => {
                    currentPage = i;
                    loadImages();
                };
                paginationElement.appendChild(button);
            }
        }

        // Call loadImages to fetch and display the images when the script runs
        loadImages();
    </script>

    <a href="index.html">
        <img id="home-button" class="home-button" title="Go Home" src="https://file.garden/ZhTgSjrp5nAroRKq/cooltext473430399612799.gif" alt="Home Button" />
    </a>

    <footer>
        <h6>2024 - ???</h6>
    </footer>
    
</body>

</html>
