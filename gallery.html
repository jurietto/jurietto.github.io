<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juri's Stuff - About Me</title>

    <!-- Firebase App, Database, and Storage libraries -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js"></script>
    <link rel="stylesheet" href="style.css">

    <style>
        /* Apply full screen background image */
        body {
            background-image: url('https://file.garden/ZhTgSjrp5nAroRKq/321354');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: white; /* Ensure all text is visible */
            font-family: Arial, sans-serif; /* Clean font */
        }

        /* Header and Main Title */
        h1 {
            text-align: center;
            margin-top: 20px;
        }

        /* Search and Filter Section */
        .controls {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }

        .controls input[type="text"], .controls select {
            margin: 0 10px;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ddd;
        }

        /* Gallery container style */
        .gallery {
            display: flex;
            flex-direction: column; /* Stack items vertically */
            gap: 20px; /* Space between items */
            margin: 0 auto; /* Center the gallery */
            width: 80%; /* Width of the gallery area */
        }

        .gallery-item {
            display: flex;
            flex-direction: column; /* Align items vertically */
            align-items: center; /* Center items */
            text-align: center; /* Center text */
        }

        .gallery img {
            width: 200px; /* Set the width for images */
            height: auto; /* Maintain aspect ratio */
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .caption {
            font-size: 14px; /* Caption text size */
            margin-top: 5px; /* Margin above caption */
        }

        .divider {
            width: 100%; /* Full width for the divider */
            height: 2px; /* Height of the divider */
            background-color: white; /* Divide color */
            margin: 20px 0; /* Margin for the divider */
        }

        /* Pagination styles */
        .pagination {
            display: flex;
            justify-content: center; /* Center pagination controls */
            margin: 20px 0; /* Margin for pagination */
        }

        .pagination button {
            margin: 0 5px;
            padding: 10px 15px;
            border-radius: 5px;
            border: none;
            background-color: #007BFF;
            color: white;
            cursor: pointer;
        }

        .pagination button:disabled {
            background-color: gray; /* Style for disabled buttons */
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <img 
        style="transform: rotate(-5deg); border: 1px solid;" 
        src="https://file.garden/ZhTgSjrp5nAroRKq/Ggjhqk2XoAA9gZu.jpg" 
        alt="Decorative Image" 
        width="200" 
        height="150" 
    />
    <h1>Gallery</h1>

    <!-- Search Box and Sort Options -->
    <div class="controls">
        <input type="text" id="search" placeholder="Search..." />
        <select id="sortBy">
            <option value="default">Sort by</option>
            <option value="caption">Caption</option>
            <option value="date">Date</option>
        </select>
    </div>

    <div class="gallery" id="gallery"></div> <!-- Container for the gallery images -->

    <!-- Dummy Divider Image -->
    <img src="https://file.garden/ZhTgSjrp5nAroRKq/yourDividerImageURL.jpg" alt="Divider" class="divider" />

    <!-- Pagination Controls -->
    <div class="pagination" id="pagination">
        <button id="prevPage" disabled>Previous</button>
        <button id="nextPage">Next</button>
    </div>

    <script>
        // Your Firebase configuration object
        const firebaseConfig = {
            apiKey: "AIzaSyCfrP-AaY1cGuj5zQ-ygPBp_SI0oT4zA7s",
            authDomain: "comments-ff6c9.firebaseapp.com",
            databaseURL: "https://comments-ff6c9-default-rtdb.firebaseio.com",
            projectId: "comments-ff6c9",
            storageBucket: "comments-ff6c9.appspot.com",
            messagingSenderId: "778548096311",
            appId: "1:778548096311:web:968b95a4fc97f13f21feb2",
            measurementId: "G-T8QFHWJDB5"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Reference to the gallery and pagination elements
        const galleryElement = document.getElementById('gallery');
        const pagination = document.getElementById('pagination');
        const prevPageButton = document.getElementById('prevPage');
        const nextPageButton = document.getElementById('nextPage');
        const searchInput = document.getElementById('search');
        const sortSelect = document.getElementById('sortBy');

        let images = [];
        let currentPage = 0;
        const imagesPerPage = 5;

        // Function to fetch images and captions from Firebase
        function loadImages() {
            database.ref('gallery').on('value', (snapshot) => {
                images = []; // Clear existing images
                snapshot.forEach((childSnapshot) => {
                    images.push(childSnapshot.val());
                });
                displayImages();
                updatePagination();
            }, (error) => {
                console.error("Error fetching data: ", error);
            });
        }

        // Function to display images based on the current page
        function displayImages() {
            galleryElement.innerHTML = '';

            // Filter images based on search
            const searchQuery = searchInput.value.toLowerCase();
            const filteredImages = images.filter(image => image.text.toLowerCase().includes(searchQuery));

            // Sort images based on selected option
            if (sortSelect.value === "caption") {
                filteredImages.sort((a, b) => a.text.localeCompare(b.text));
            } else if (sortSelect.value === "date") {
                // Assuming you have a date field in your data to sort by
                // filteredImages.sort((a, b) => new Date(b.date) - new Date(a.date));
            }

            // Pagination logic
            const start = currentPage * imagesPerPage;
            const end = start + imagesPerPage;
            const pagedImages = filteredImages.slice(start, end);

            pagedImages.forEach(imageData => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'gallery-item';

                const img = document.createElement('img');
                img.src = imageData.url; 
                img.alt = imageData.text; 

                const captionElement = document.createElement('p');
                captionElement.textContent = imageData.text;
                captionElement.className = 'caption';

                const metaElement = document.createElement('p');
                metaElement.textContent = `<Meta Data>`; // Replace with actual metadata if available

                itemDiv.appendChild(img);
                itemDiv.appendChild(captionElement);
                itemDiv.appendChild(metaElement);
                galleryElement.appendChild(itemDiv);
            });
        }

        // Update pagination buttons
        function updatePagination() {
            const totalPages = Math.ceil(images.length / imagesPerPage);
            prevPageButton.disabled = currentPage === 0; // Disable on the first page
            nextPageButton.disabled = currentPage >= totalPages - 1; // Disable on last page
        }

        // Event listeners for pagination buttons
        prevPageButton.addEventListener('click', () => {
            if (currentPage > 0) {
                currentPage--;
                displayImages();
                updatePagination();
            }
        });

        nextPageButton.addEventListener('click', () => {
            const totalPages = Math.ceil(images.length / imagesPerPage);
            if (currentPage < totalPages - 1) {
                currentPage++;
                displayImages();
                updatePagination();
            }
        });

        // Search event listener
        searchInput.addEventListener('keyup', () => {
            currentPage = 0; // Reset to first page on search
            displayImages();
            updatePagination();
        });

        // Sort event listener
        sortSelect.addEventListener('change', () => {
            currentPage = 0; // Reset to first page on sort
            displayImages();
            updatePagination();
        });

        // Initial load of images
        loadImages();
    </script>

    <a href="index.html">
        <img id="home-button" class="home-button" title="Go Home" src="https://file.garden/ZhTgSjrp5nAroRKq/cooltext473430399612799.gif" alt="Home Button" />
    </a>

    <footer>
        <h6>2024 - ???</h6>
    </footer>
    
</body>

</html>
