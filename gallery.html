<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juri's Stuff - About Me</title>

    <!-- Inline CSS -->
    <style>
        /* Ensure h2 and h3 elements are centered on mobile devices */
        @media (max-width: 768px) {
            h2, h3 {
                text-align: center;
            }
        }

        /* Other existing styles */
        .gallery-item {
            margin-bottom: 20px;
        }

        .caption {
            font-size: 14px;
            color: #555;
        }

        .timestamp {
            font-size: 12px;
            color: #777;
        }

        .divider {
            margin-top: 10px;
            margin-bottom: 10px;
            display: block;
            width: 100%;
        }
    </style>

    <!-- Firebase App (the core Firebase SDK) is always required and must be listed first -->
    <script src="https://www.gstatic.com/firebasejs/9.8.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.8.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.8.0/firebase-auth.js"></script>
</head>

<body>
    <img 
        style="transform: rotate(-5deg); border: 1px solid;" 
        src="https://file.garden/ZhTgSjrp5nAroRKq/Ggjhqk2XoAA9gZu.jpg" 
        alt="Decorative Image" 
        width="200" 
        height="150" 
    />

    <h1>Gallery</h1>

    <!-- Search and Sort UI -->
    <div>
        <input type="text" id="search" placeholder="Search..." oninput="loadImages()">
        <select id="sort" onchange="loadImages()">
            <option value="asc">Sort by Oldest</option>
            <option value="desc">Sort by Newest</option>
        </select>
    </div>
    
    <div class="gallery" id="gallery"></div> <!-- Container for the gallery images -->

    <!-- Pagination -->
    <div class="pagination" id="pagination">
        <button id="prev" onclick="changePage(-1)">&#60; Prev</button>
        <span id="page-numbers"></span>
        <button id="next" onclick="changePage(1)">Next &#62;</button>
    </div>

    <!-- Include the external JavaScript file -->
    <script src="gallery.js"></script>

    <a href="index.html">
        <img id="home-button" class="home-button" title="Go Home" src="https://file.garden/ZhTgSjrp5nAroRKq/cooltext473430399612799.gif" alt="Home Button" />
    </a>

    <footer>
        <h6>2024 - ???</h6>
    </footer>
    
</body>

</html>
