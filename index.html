<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juri's Stuff</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        @font-face {
            font-family: 'Apple Chancery';
            src: url('https://file.garden/ZhTgSjrp5nAroRKq/apple-chancery.ttf');
        }

        body {
            margin: 0;
            font-family: 'Apple Chancery', serif;
            color: white;
            background-color: black;
            overflow-x: hidden; /* Only hide horizontal overflow to allow vertical scrolling */
        }

        main {
            padding: 20px;
            position: relative;
            z-index: 2;
            text-align: left; /* Align text to the left */
            margin-left: 20px; /* Margin from the left */
        }

        footer {
            text-align: center;
            font-family: 'MS UI Gothic', sans-serif;
            font-size: 1rem;
            padding: 20px 0;
            position: relative;
            z-index: 2;
        }

        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 120%; /* 120% zoomed in */
            height: 120%; /* 120% zoomed in */
            transform: translate(-10%, -10%);
            object-fit: cover;
            z-index: 1;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8); /* 80% opacity black overlay */
            z-index: 2;
        }

        .content-wrapper {
            position: relative;
            z-index: 3;
        }

        ul {
            list-style: none;
            padding: 0;
            font-family: 'Apple Chancery';
        }

        ul li {
            margin: 10px 0; /* Adjusted margin for better spacing */
            font-size: 1.2rem; /* Font size */
            display: flex;
            align-items: center;
        }

        ul li h2 a {
            color: white; /* Make links white */
            text-decoration: none;
            margin-left: 10px; /* Space between symbols and link */
        }

        ul li h2 a:hover {
            color: #ff1770; /* Hover color */
        }

        ul li::before {
            font-size: 1.2rem; /* Symbol size */
            color: white;
            text-shadow:
                0 0 10px rgba(255, 0, 0, 1),
                0 0 20px rgba(255, 0, 0, 1),
                0 0 30px rgba(255, 0, 0, 1);
            margin-right: 10px; /* Space between symbol and link */
        }

        .heart::before { content: '♥'; }
        .star::before { content: '★'; }
        .king::before { content: '♛'; }
        .club::before { content: '♣'; }
        .diamond::before { content: '♦'; }
        .spade::before { content: '♠'; }
        .note::before { content: '♪'; }

        @media (max-width: 600px) {
            .video-background {
                display: none; /* Hide the video background on mobile */
            }

            body {
                background-color: black;
                background-image: url('https://file.garden/ZhTgSjrp5nAroRKq/bloods.png'); /* Use the same background as updates.html */
                background-size: contain;
                background-repeat: no-repeat;
                background-position: center;
                background-attachment: fixed;
            }
        }
    </style>
</head>

<body>
    <video autoplay muted loop class="video-background">
        <source src="https://file.garden/ZhTgSjrp5nAroRKq/videoplayback.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <div class="overlay"></div>

    <main>
        <div class="content-wrapper">
            <h1>Welcome to Juri's Stuff</h1>
            <p>Note: Under Construction :)</p>
            <ul>
                <li class="heart"><h2><a href="about.html">Introduction</a></h2></li>
                <li class="star"><h2><a href="https://x.com/sotokomorii">Twitter</a></h2></li>
                <li class="king"><h2><a href="https://bsky.app/profile/sotokomori.bsky.social">Bluesky</a></h2></li>
                <li class="club"><h2><a href="https://www.youtube.com/@juriscafe">YouTube</a></h2></li>
                <li class="diamond"><h2><a href="https://soundcloud.com/jetsetjuri">SoundCloud</a></h2></li>
                <li class="spade"><h2><a href="gallery.html">Gallery</a></h2></li>
                <li class="note"><h2><a href="vns.html">Visual Novels</a></h2></li>
                <li class="heart"><h2><a href="updates.html">Updates</a></h2></li>
            </ul>
        </div>
    </main>
    
</body>

</html>
