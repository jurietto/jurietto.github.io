<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juri's Stuff</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        @font-face {
            font-family: 'Apple Chancery';
            src: url('https://file.garden/ZhTgSjrp5nAroRKq/apple-chancery.ttf');
        }

        body {
            margin: 0;
            font-family: 'Apple Chancery', serif;
            color: white;
            overflow: hidden;
            position: relative;
            background-color: black;
        }

        main {
            padding: 20px;
            position: relative;
            z-index: 2;
            text-align: left;
        }

        footer {
            text-align: center;
            font-family: 'MS UI Gothic', sans-serif;
            font-size: 1rem;
            padding: 20px 0;
            position: relative;
            z-index: 2;
        }

        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 130%;
            height: 130%;
            transform: translate(-15%, -15%);
            object-fit: cover;
            z-index: 1;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5); /* Black color with 50% opacity */
            z-index: 2;
        }

        .content-wrapper {
            position: relative;
            z-index: 3;
        }

        ul {
            list-style: none;
            padding: 0;
            font-family: 'Apple Chancery';
        }

        ul li {
            margin: 10px 0;
            font-size: 1.5rem;
        }

        ul li h2 {
            display: inline;
        }

        ul li::before {
            content: attr(data-symbol);
            margin-right: 10px;
            font-size: 1.5rem;
            text-shadow:
                0 0 10px rgba(255, 0, 0, 1),
                0 0 20px rgba(255, 0, 0, 1),
                0 0 30px rgba(255, 0, 0, 1);
        }

        @media (max-width: 600px) {
            .video-background {
                transform: translate(-50%, -50%);
                width: 150%;
                height: 150%;
            }
        }
    </style>
</head>

<body>
    <video autoplay muted loop class="video-background">
        <source src="https://file.garden/ZhTgSjrp5nAroRKq/videoplayback.mp4" type="video/mp4">
