<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juri's Stuff</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        @font-face {
            font-family: 'Apple Chancery';
            src: url('https://file.garden/ZhTgSjrp5nAroRKq/apple-chancery.ttf');
        }

        body {
            margin: 0;
            font-family: 'Apple Chancery', serif;
            color: white;
            background-color: black;
            overflow-x: hidden; /* Only hide horizontal overflow to allow vertical scrolling */
        }

        main {
            padding: 20px;
            position: relative;
            z-index: 2;
            text-align: left;
            margin-left: 20px; /* Increase the margin from the left */
        }

        footer {
            text-align: center;
            font-family: 'MS UI Gothic', sans-serif;
            font-size: 1rem;
            padding: 20px 0;
            position: relative;
            z-index: 2;
        }

        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 120%; /* 120% zoomed in */
            height: 120%; /* 120% zoomed in */
            transform: translate(-10%, -10%);
            object-fit: cover;
            z-index: 1;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8); /* 80% opacity black overlay */
            z-index: 2;
        }

        .content-wrapper {
            position: relative;
            z-index: 3;
        }

        ul {
            list-style: none;
            padding: 0;
            font-family: 'Apple Chancery';
        }

        ul li {
            margin: 5px 0; /* Reduced margin for smaller spacing */
            font-size: 1.2rem; /* Smaller font size */
            display: flex;
            align-items: center;
        }

        ul li h2 a {
            color: white; /* Make h2 links white */
            text-decoration: none;
        }

        ul li h2 a:hover {
            color: #ff1770; /* Hover color */
        }

        ul li::before {
            content: attr(data-symbol);
            font-size: 1.2rem; /* Smaller symbol size */
            color: white;
            text-shadow:
                0 0 10px rgba(255, 0, 0, 1),
                0 0 20px rgba(255, 0, 0, 1),
                0 0 30px rgba(255, 0, 0, 1);
            margin-right: 5px; /* Reduced spacing between symbol and text */
        }

        @media (max-width: 600px) {
            .video-background {
                width: 150%;
                height: 150%;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
            }
        }
    </style>
</head>

<body>
    <video autoplay muted loop class="video-background">

                <li data-symbol="&#9824;"><h2><a href="gallery.html">Gallery</a></h2></li>
                <li data-symbol="&#9834;"><h2><a href="vns.html">Visual Novels</a></h2></li>
                <li data-symbol="&#9829;"><h2><a href="updates.html">Updates</a></h2></li>
            </ul>
        </div>
    </main>

</body>
