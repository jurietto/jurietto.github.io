<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>Life Updates</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>

        .update {
            margin-bottom: 40px; /* Space between posts */
        }
        .date {
            font-weight: bold;
        }
        .update h2 {
            margin-top: 0; /* Remove space above the title */
        }
        .update p {
            margin-bottom: 15px; /* Add space below each paragraph */
        }
        .search-sort {
            margin-bottom: 20px;
        }
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
        }
        .pagination button {
            margin: 0 5px;
            padding: 5px 10px;
            cursor: pointer;
            background-color: #FF0099;
            color: white;
            border: none;

        }
        .pagination button:disabled {

        }
        .home-button {

<body>
    <img 
        style="transform: rotate(-5deg); border: 1px solid;" 
        src="https://file.garden/ZhTgSjrp5nAroRKq/Ggjhqk2XoAA9gZu.jpg" 
        alt="Decorative Image" 
        width="200" 
        height="150" 
    />
    <h1>Life Updates</h1>
    <div class="search-sort">
        <input type="text" id="search" placeholder="Search..." oninput="loadUpdates()">
        <select id="sort" onchange="loadUpdates()">
            <option value="desc">Sort by Newest</option>
            <option value="asc">Sort by Oldest</option>
            <option value="shuffle">Shuffle</option>
        </select>
    </div>
    <div id="updates"></div>
    <div class="pagination" id="pagination">
        <button id="prev" onclick="changePage(-1)">&#60; Prev</button>
        <span id="page-numbers"></span>
        <button id="next" onclick="changePage(1)">Next &#62;</button>
    </div>

    <script>
        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCfrP-AaY1cGuj5zQ-ygPBp_SI0oT4zA7s",
            authDomain: "comments-ff6c9.firebaseapp.com",
            databaseURL: "https://updates-e2454.firebaseio.com/",
            projectId: "comments-ff6c9",
            storageBucket: "comments-ff6c9.appspot.com",
            messagingSenderId: "778548096311",
            appId: "1:778548096311:web:968b95a4fc97f13f21feb2",
            measurementId: "G-T8QFHWJDB5"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let currentPage = 1;
        const itemsPerPage = 5;
        let totalPages = 1;

        // Function to fetch and display life updates
        function loadUpdates() {
            const searchQuery = document.getElementById('search').value.toLowerCase();
            const sortOrder = document.getElementById('sort').value || 'desc';

            // Fetch data from Firebase Realtime Database
            database.ref('lifeupdates').orderByChild('timestamp').once('value', (snapshot) => {
                let updates = [];
                snapshot.forEach((childSnapshot) => {
                    const updateData = childSnapshot.val();
                    const date = new Date(updateData.timestamp).toLocaleString().toLowerCase();
                    // Filter updates based on search query
                    if (!searchQuery || updateData.content.toLowerCase().includes(searchQuery) || updateData.title.toLowerCase().includes(searchQuery) || date.includes(searchQuery)) {
                        updates.push({ key: childSnapshot.key, ...updateData });
                    }
                });

                // Log the updates for debugging
                console.log("Fetched updates: ", updates);

                // Sort updates
                if (sortOrder === 'desc') {
                    updates.reverse();
                } else if (sortOrder === 'shuffle') {
                    updates = shuffle(updates);
                }

                // Pagination logic
                totalPages = Math.ceil(updates.length / itemsPerPage);
                const start = (currentPage - 1) * itemsPerPage;
                const end = start + itemsPerPage;
                const paginatedUpdates = updates.slice(start, end);

                // Display updates
                displayUpdates(paginatedUpdates);

                // Display pagination
                displayPagination();
            }, (error) => {
                console.error("Error fetching data: ", error);
            });
        }

        // Function to display life updates
        function displayUpdates(updates) {
            const updatesContainer = document.getElementById('updates');
            updatesContainer.innerHTML = ''; // Clear previous updates

            if (updates.length === 0) {
                updatesContainer.innerHTML = '<p>No updates found.</p>';
                return;
            }

            updates.forEach((update) => {
                const updateDiv = document.createElement('div');
                updateDiv.className = 'update';

                const dateElement = document.createElement('p');
                dateElement.className = 'date';
                const date = new Date(update.timestamp);
                dateElement.innerHTML = date.toLocaleString();
                updateDiv.appendChild(dateElement);

                const titleElement = document.createElement('h2');
                titleElement.textContent = update.title;
                updateDiv.appendChild(titleElement);

                // Add horizontal line below the title
                const hrElement = document.createElement('hr');
                updateDiv.appendChild(hrElement);

                const contentElement = document.createElement('p');
                contentElement.innerHTML = update.content;
                updateDiv.appendChild(contentElement);

                updatesContainer.appendChild(updateDiv);
            });
        }

        // Function to display pagination controls
        function displayPagination() {
            const paginationElement = document.getElementById('pagination');
            const pageNumbersElement = document.getElementById('page-numbers');
            pageNumbersElement.innerHTML = ''; // Clear previous page numbers

            // Disable prev button if on the first page
            document.getElementById('prev').disabled = currentPage === 1;
            // Disable next button if on the last page
            document.getElementById('next').disabled = currentPage === totalPages;

            // Create pagination buttons
            for (let i = 1; i <= totalPages; i++) {
                const button = document.createElement('button');
                button.textContent = i;
                button.className = i === currentPage ? 'active' : '';
                button.onclick = () => {
                    currentPage = i;
                    loadUpdates();
                };
                pageNumbersElement.appendChild(button);
            }
        }

        // Function to change the current page and reload updates
        function changePage(direction) {
            currentPage += direction;
            loadUpdates();
        }

        // Helper function to shuffle an array
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // Call loadUpdates to fetch and display the updates when the script runs
        window.addEventListener('load', loadUpdates);
    </script>
