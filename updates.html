<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Meta Tags -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page Title -->
    <title>Juri's Stuff - About Me</title>
</head>

<body>

    <!-- Gallery Header Text -->
    <h1>Gallery</h1>

    <!-- Search and Sort UI -->
    <div>
        <input type="text" id="search" placeholder="Search..." oninput="loadImages()">
        <select id="sort" onchange="loadImages()">
            <option value="asc">Sort by Oldest</option>
            <option value="desc">Sort by Newest</option>
            <option value="shuffle">Shuffle</option>
        </select>
    </div>

    <!-- Gallery Container for Images -->
    <div id="gallery"></div>

    <!-- Pagination Section -->
    <div id="pagination">
        <button id="prev" onclick="changePage(-1)">&lt; Prev</button>
        <span id="page-numbers"></span>
        <button id="next" onclick="changePage(1)">Next &gt;</button>
    </div>

    <!-- Home Button to Navigate to the Homepage -->
    <a href="index.html">
        <img id="home-button" title="Go Home" src="https://file.garden/ZhTgSjrp5nAroRKq/cooltext473430399612799.gif" alt="Home Button" />
    </a>

    <!-- Footer Section with Copyright Information -->
    <footer>
        <h6>2024 - ???</h6>
    </footer>

    <!-- Include External JavaScript File -->
    <script src="gallery.js"></script>
</body>

</html>
