<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juri's Stuff - Updates</title>

    <link rel="stylesheet" href="https://file.garden/ZhTgSjrp5nAroRKq/apple-chancery.ttf" type="font/ttf" />
    <link rel="stylesheet" href="LINDL___.TTF" type="font/ttf" /> 

    <style>
        /* ------------------------------ 
           GLOBAL STYLES
        --------------------------------- */
        @font-face {
            font-family: 'Apple Chancery';
            src: url('https://file.garden/ZhTgSjrp5nAroRKq/apple-chancery.ttf');
        }

        @font-face {
            font-family: 'MS UI Gothic';
            src: url('https://path_to_MS_UI_Gothic.ttf'); /* Correct path for MS UI Gothic */
        }

        body {
            font-family: 'Apple Chancery', 'MS UI Gothic', serif;
            background-color: black;
            background-image: url('https://file.garden/ZhTgSjrp5nAroRKq/bloods.png');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            background-attachment: fixed;
            color: white;
            line-height: 1.6;
            width: 90%;
            max-width: 700px; 
            margin: 0 auto; 
            padding: 10px;
            position: relative; 
            text-align: left;
        }

        /* Responsive font family adjustment */
        @media (max-width: 600px) {
            body {
                font-family: 'MS UI Gothic', serif;
            }
        }

        /* ------------------------------ 
           GLOW EFFECT STYLES
        --------------------------------- */
        * {
            text-shadow: 
                0 0 10px rgba(255, 0, 0, 1), /* Red glow */
                0 0 20px rgba(255, 0, 0, 1),
                0 0 30px rgba(255, 0, 0, 1);
        }

        h1, h2, h3, h4, h5 {
            text-shadow: none; /* No glow for headings */
        }

        /* ------------------------------ 
           HEADER STYLES
        --------------------------------- */
        header {
            position: relative; 
            height: 200px; 
            margin-bottom: 40px; /* Space below header */
            padding: 0 10px; /* Uniform padding around header content */
            text-align: center; /* Center title text */
        }

        .title-container {
            max-width: 100%;
        }

        .title-container h1 {
            margin: 0; 
            font-family: 'Apple Chancery';
            font-size: 3rem;
        }

        nav {
            margin-top: 15px; 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            align-items: center; 
            padding: 10px 0; 
        }

        nav a {
            color: white; /* Default white color for links */
            text-decoration: none; 
            margin: 0 10px; 
            font-family: 'Apple Chancery'; 
        }

        nav .separator {
            color: white; 
            margin: 0 5px; 
        }

        nav a:hover {
            color: #ff007b; /* Magenta hover color */
        }

        /* ------------------------------ 
           MAIN CONTENT STYLES
        --------------------------------- */
        main {
            text-align: justify; 
            padding: 0 20px; /* Horizontal padding for main */
        }

        h2 {
            margin: 20px 0; 
            text-align: center; 
        }

        .divider {
            background-image: url('https://enchantingcastle.com/gifs%20&%20pixel%20art/dividers/84.gif');
            height: 24px; 
            background-repeat: repeat-x; 
            border: none; 
            margin: 15px 0; 
            width: 100%; 
            display: block; 
        }

        /* Search and Sort UI Container */
        .search-sort-container {
            display: flex;
            justify-content: center; 
            align-items: center; 
            margin: 20px auto; /* centers the container */
            width: 90%; /* ensures it doesn't overflow */
            max-width: 700px; /* consistent max width */
            padding: 0 10px; /* adds padding for responsive design */
        }

        input[type="text"], 
        select {
            padding: 10px; 
            margin: 0 5px; 
            font-size: 1rem; 
            font-family: 'MS UI Gothic'; /* Use MS UI Gothic for inputs */
            background-color: black; /* Background for input and select */
            color: white; /* Text color for input and select */
            border: 1px solid white; /* Border color */
            text-shadow: none; /* No glow for inputs */
            flex: 1; /* Makes input and select fill available space */
        }

        /* Responsive adjustment for search and sort */
        @media (max-width: 600px) {
            .search-sort-container {
                flex-direction: column; /* Stack elements for mobile */
                align-items: stretch; /* Stretch to fill container */
            }

            input[type="text"], 
            select {
                width: 100%; /* Full width for inputs */
                margin-bottom: 10px; /* Space between inputs for mobile */
                font-size:.8rem;
                padding:.5rem;
                margin-left:.5rem;
                margin-right:.5rem;
                border-radius:.5rem;
                background-color:.2;
                border-color:.2;
                color:white;
                text-align:center;
                text-shadow:none;
                opacity:.7;

                animation-name:aqua-in-out-slow;
                animation-duration:.7s;
                animation-fill-mode:both;

                @keyframes aqua-in-out-slow{
                    from{opacity:.2;}
                    to{opacity:.7;}
                    from{transform-scale(1);}
                    to{transform-scale(1.1);}
                    from{background-color:.2;}
                    to{background-color:.7;}
                    from{color:white;}
                    to{color:white;}
                    from{border-color:.2;}
                    to{border-color:.7;}
                }
                
                @media screen and (max-width:.6rem){input[type="text"],select{display:none;font-size:.3rem;width:auto;padding:.3rem;margin-left:.3rem;margin-right:.3rem;}}

                @media screen and (max-height:.6rem){input[type="text"],select{display:none;font-size:.3rem;width:auto;padding:.3rem;margin-left:.3rem;margin-right:.3rem;}}

                @media screen and (max-height:.4rem){input[type="text"],select{display:none;font-size:.2rem;width:auto;padding:.2rem;margin-left:.2rem;margin-right:.2rem;}}

                @media screen and (max-height:.2rem){input[type="text"],select{display:none;font-size:.1rem;width:auto;padding:.1rem;margin-left:.1rem;margin-right:.1rem;}}

                @media screen and (orientation:Landscape){input[type="text"],select{display:none;font-size:.2rem;width:auto;padding:.2rem;margin-left:.2rem;margin-right:.2rem;}}

                @media screen and (orientation:Landscape){input[type="text"],select{display:block;font-size:.7rem;width:auto;padding:.7rem;margin-left:.7rem;margin-right:.7rem;}}

                @media screen and (max-width:.5rem){input[type="text"],select{display:none;font-size:.2rem;width:auto;padding:.2rem;margin-left:.2rem;margin-right:.2rem;}}

                @media screen and (max-width:.2rem){input[type="text"],select{display:none;font-size:.1rem;width:auto;padding:.1rem;margin-left:.1rem;margin-right:.1rem;}}

                
                
                
                
                
                
                
                
                
                
                
                
                
                
                
                
                
                
                


            
            

            
            
            



            
            
            
            

            
            

            
            
            

            
            





            
              



            
            





            



            
            

            
            

            
            

            
            

            
             
            
      }
    </style>
</head>
<body>
    <!-- Header Section -->
    <header class="title-container">
    <nav>
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
      <span class="separator">|</span>
      <a href="#">GitHub</a>
      <a href="#">Blog</a>
      <a href="#">Instagram</a>
    </nav>
    </header>

    <!-- Main Content Section -->
    <main class=".container">
      <!-- Gallery Section -->
      <div class="gallery">
          <!-- Update Items go here -->
          <!-- Update Item Example -->
          <div class="gallery-item">
              <div class="decor-gif-left">
                  <img src="decor.gif" alt="Decor Gif Left">
              </div>
              <div class="symbol-divider">
                  &#128681;&#65039;&#9869;&#9927;&#9839;&#9853;&#9829;&#9834;&#9838;&#9858;&#9848;&#9854;&#9864;&#9836;&#9847;&#9866;&#9831;&#9856;&#9828;
              </div>
              <div class="decor-gif-right">
                  <img src="decor.gif" alt="Decor Gif Right">
              </div>
              <h2>Update Item Title</h2>
              <p>Update Item Description</p>
          </div>
      </div>

      <!-- Search and Sort Section -->
      <div class="search-sort-container">
          <input type="text" placeholder="Search...">
          <select>
              <option value="">Sort by:</option>
              <option value="date">Date</option>
              <option value="title">Title</option>
          </select>
      </div>

      <!-- Pagination Section -->
      <div class="pagination">
          <button>&laquo;</button>
          <button>1</button>
          <button>2</button>
          <button>3</button>
          <button>&raquo;</button>
      </div>

      <!-- Footer Section -->
      <footer>&copy; Juri's Stuff - All Rights Reserved</footer>

    </main>

</body>
</html>
