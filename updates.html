<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Updates</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        @font-face {
            font-family: 'Malkavian';
            src: url('https://file.garden/ZhTgSjrp5nAroRKq/Malkavian%20Font%20Regular.ttf') format('truetype');
        }

        body {
            background-color: #000;
            color: #f0f0f0;
            font-family: 'MS Gothic', sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            text-align: center;
            padding: 20px;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 1) 0%, rgba(0, 0, 0, 0.8) 50%, rgba(0, 0, 0, 0.6) 100%), url('https://file.garden/ZhTgSjrp5nAroRKq/Ggjhqk2XoAA9gZu.jpg');
            background-size: cover;
            background-position: center;
        }

        header img {
            display: none; /* Hide the image since it's now a background */
        }

        h1 {
            font-family: 'Lindley', sans-serif;
            font-size: 4em;
            color: #FF0099;
            margin: 0;
            padding: 10px 0;
        }

        .search-sort {
            text-align: center;
            margin: 20px 0;
        }

        .gallery {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .gallery-item {
            width: 90%;
            max-width: 600px;
            background-color: rgba(0, 0, 0, 0.8);
            background-image: linear-gradient(45deg, rgba(255, 0, 153, 0.1) 25%, transparent 25%, transparent 50%, rgba(255, 0, 153, 0.1) 50%, rgba(255, 0, 153, 0.1) 75%, transparent 75%, transparent), url('https://file.garden/ZhTgSjrp5nAroRKq/Ggjhqk2XoAA9gZu.jpg');
            background-size: 20px 20px;
            border: 1px solid #FF0099;
            border-radius: 10px;
            margin: 40px 0;
            padding: 20px;
            box-shadow: 0 0 15px rgba(255, 0, 153, 0.5);
        }

        .gallery-item h2 {
            font-family: 'Lindley', sans-serif;
            font-size: 2.5em;
            color: #FF0099;
        }

        .date {
            font-family: 'Malkavian', sans-serif;
            font-weight: bold;
            color: #aaa;
            margin-bottom: 10px;
        }

        .line {
            height: 1px;
            background-color: grey;
            margin: 20px 0;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px 0;
        }

        .pagination button {
            margin: 0 5px;
            padding: 10px 15px;
            cursor: pointer;
        }

        footer {
            text-align: center;
            padding: 20px;
        }

        .home-button {
            position: fixed;
            bottom: 10px;
            right: 10px;
            width: 150px;
            height: 150px;
            cursor: pointer;
            z-index: 10000;
        }

        @media screen and (max-width: 700px) {
            body {
                padding: 20px;
            }

            .home-button {
                top: 10px;
                bottom: auto;
                width: 100px;
                height: 100px;
            }

            h1,
            h3,
            h4,
            h5,
            h6,
            a,
            ul li,
            footer {
                text-shadow: none;
            }
        }
    </style>
</head>

<body>
    <header>
        <img 
            src="https://file.garden/ZhTgSjrp5nAroRKq/Ggjhqk2XoAA9gZu.jpg" 
            alt="Decorative Image" 
        />
        <h1>Life Updates</h1>
    </header>
    <div class="search-sort">
        <input type="text" id="search" placeholder="Search..." oninput="loadUpdates()">
        <select id="sort" onchange="loadUpdates()">
            <option value="desc">Sort by Newest</option>
            <option value="asc">Sort by Oldest</option>
            <option value="shuffle">Shuffle</option>
        </select>
    </div>
    <div class="gallery" id="updates"></div>
    <div class="pagination" id="pagination">
        <button id="prev" onclick="changePage(-1)">&#60; Prev</button>
        <span id="page-numbers"></span>
        <button id="next" onclick="changePage(1)">Next &#62;</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCfrP-AaY1cGuj5zQ-ygPBp_SI0oT4zA7s",
            authDomain: "comments-ff6c9.firebaseapp.com",
            databaseURL: "https://updates-e2454.firebaseio.com/",
            projectId: "comments-ff6c9",
            storageBucket: "comments-ff6c9.appspot.com",
            messagingSenderId: "778548096311",
            appId: "1:778548096311:web:968b95a4fc97f13f21feb2",
            measurementId: "G-T8QFHWJDB5"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let currentPage = 1;
        const itemsPerPage = 5;
        let totalPages = 1;

        function loadUpdates() {
            const searchQuery = document.getElementById('search').value.toLowerCase();
            const sortOrder = document.getElementById('sort').value || 'desc';

            database.ref('lifeupdates').orderByChild('timestamp').once('value', (snapshot) => {
                let updates = [];
                snapshot.forEach((childSnapshot) => {
                    const updateData = childSnapshot.val();
                    const date = new Date(updateData.timestamp).toLocaleString().toLowerCase();
                    if (!searchQuery || updateData.content.toLowerCase().includes(searchQuery) || updateData.title.toLowerCase().includes(searchQuery) || date.includes(searchQuery)) {
                        updates.push({ key: childSnapshot.key, ...updateData });
                    }
                });

                console.log("Fetched updates: ", updates);

                if (sortOrder === 'desc') {
                    updates.reverse();
                } else if (sortOrder === 'shuffle') {
                    updates = shuffle(updates);
                }

                totalPages = Math.ceil(updates.length / itemsPerPage);
                const start = (currentPage - 1) * itemsPerPage;
                const end = start + itemsPerPage;
                const paginatedUpdates = updates.slice(start, end);

                displayUpdates(paginatedUpdates);
                displayPagination();
            }, (error) => {
                console.error("Error fetching data: ", error);
            });
        }

        function displayUpdates(updates) {
            const updatesContainer = document.getElementById('updates');
            updatesContainer.innerHTML = '';

            if (updates.length === 0) {
                updatesContainer.innerHTML = '<p>No updates found.</p>';
                return;
            }

            updates.forEach((update, index) => {
                const updateDiv = document.createElement('div');
                updateDiv.className = 'gallery-item';

                const titleElement = document.createElement('h2');
                titleElement.textContent = update.title;
                updateDiv.appendChild(titleElement);

                const dateElement = document.createElement('span');
                dateElement.className = 'date';
                const date = new Date(update.timestamp);
                dateElement.innerHTML = date.toLocaleString();
                updateDiv.appendChild(dateElement);

                const hrElement = document.createElement('div');
                hrElement.className = 'line';
                updateDiv.appendChild(hrElement);

                const contentElement = document.createElement('p');
                contentElement.innerHTML = update.content;
                updateDiv.appendChild(contentElement);

                updatesContainer.appendChild(updateDiv);

                if (index < updates.length - 1) {
                    const divider = document.createElement('img');
                    divider.className = 'divider';
                    divider.src = 'https://file.garden/ZhTgSjrp5nAroRKq/20.gif';
                    updatesContainer.appendChild(divider);
                }
            });
        }

        function displayPagination() {
            const paginationElement = document.getElementById('pagination');
            const pageNumbersElement = document.getElementById('page-numbers');
            pageNumbersElement.innerHTML = '';

            document.getElementById('prev').disabled = currentPage === 1;
            document.getElementById('next').disabled = currentPage === totalPages;

            for (let i = 1; i <= totalPages; i++) {
                const button = document.createElement('button');
                button.textContent = i;
                button.className = i === currentPage ? 'active' : '';
                button.onclick = () => {
                    currentPage = i;
                    loadUpdates();
                };
                pageNumbersElement.appendChild(button);
            }
        }

        function changePage(direction) {
            currentPage += direction;
            loadUpdates();
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        window.addEventListener('load', loadUpdates);
    </script>

    <footer>
        <h6>2024 - ???</h6>
    </footer>
</body>

</html>
