<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juri's Stuff - Updates</title>

    <link rel="stylesheet" href="https://file.garden/ZhTgSjrp5nAroRKq/apple-chancery.ttf" type="font/ttf" />
    <link rel="stylesheet" href="LINDL___.TTF" type="font/ttf" /> <!-- Path to LINDL font -->

    <style>
        /* ------------------------------ 
           GLOBAL STYLES
        --------------------------------- */
        @font-face {
            font-family: 'Apple Chancery';
            src: url('https://file.garden/ZhTgSjrp5nAroRKq/apple-chancery.ttf');
        }

        @font-face {
            font-family: 'MS UI Gothic';
            src: url('https://path_to_MS_UI_Gothic.ttf'); /* Correct path for MS UI Gothic */
        }

        body {
            font-family: 'Apple Chancery', 'MS UI Gothic', serif;
            background-color: black;
            background-image: url('https://file.garden/ZhTgSjrp5nAroRKq/bloods.png');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            background-attachment: fixed;
            color: white;
            line-height: 1.6;
            width: 90%;
            max-width: 700px; 
            margin: 0 auto; 
            padding: 10px;
            position: relative; 
            text-align: left;
        }

        /* Responsive font family adjustment */
        @media (max-width: 600px) {
            body {
                font-family: 'MS UI Gothic', serif;
            }
        }

        /* ------------------------------ 
           GLOW EFFECT STYLES
        --------------------------------- */
        * {
            text-shadow: 
                0 0 10px rgba(255, 0, 0, 1), /* Red glow */
                0 0 20px rgba(255, 0, 0, 1),
                0 0 30px rgba(255, 0, 0, 1);
        }

        h1, h2, h3, h4, h5 {
            text-shadow: none; /* No glow for headings */
        }

        /* ------------------------------ 
           HEADER STYLES
        --------------------------------- */
        header {
            position: relative; 
            height: 200px; 
            margin-bottom: 40px; /* Space below header */
            padding: 0 10px; /* Uniform padding around header content */
            text-align: center; /* Center title text */
        }

        .title-container {
            max-width: 100%;
        }

        .title-container h1 {
            margin: 0; 
            font-family: 'Apple Chancery';
            font-size: 3rem;
        }

        nav {
            margin-top: 15px; 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            align-items: center; 
            padding: 10px 0; 
        }

        nav a {
            color: white; /* Default white color for links */
            text-decoration: none; 
            margin: 0 10px; 
            font-family: 'Apple Chancery'; 
        }

        nav .separator {
            color: white; 
            margin: 0 5px; 
        }

        nav a:hover {
            color: #ff007b; /* Magenta hover color */
        }

        /* ------------------------------ 
           MAIN CONTENT STYLES
        --------------------------------- */
        main {
            text-align: justify; 
            padding: 0 20px; /* Horizontal padding for main */
        }

        h2 {
            margin: 20px 0; 
            text-align: center; 
        }

        .divider {
            background-image: url('https://enchantingcastle.com/gifs%20&%20pixel%20art/dividers/84.gif');
            height: 24px; 
            background-repeat: repeat-x; 
            border: none; 
            margin: 15px 0; 
            width: 100%; 
            display: block; 
        }

        /* Search and Sort UI Container */
        .search-sort-container {
            display: flex;
            justify-content: center; 
            align-items: center; 
            margin: 20px auto; /* centers the container */
            width: 90%; /* ensures it doesn't overflow */
            max-width: 700px; /* consistent max width */
            padding: 0 10px; /* adds padding for responsive design */
        }

        input[type="text"], 
        select {
            padding: 10px; 
            margin: 0 5px; 
            font-size: 1rem; 
            font-family: 'MS UI Gothic'; /* Use MS UI Gothic for inputs */
            background-color: black; /* Background for input and select */
            color: white; /* Text color for input and select */
            border: 1px solid white; /* Border color */
            text-shadow: none; /* No glow for inputs */
            flex: 1; /* Makes input and select fill available space */
        }

        /* Responsive adjustment for search and sort */
        @media (max-width: 600px) {
            .search-sort-container {
                flex-direction: column; /* Stack elements for mobile */
                align-items: stretch; /* Stretch to fill container */
            }

            input[type="text"], 
            select {
                width: 100%; /* Full width for inputs */
                margin-bottom: 10px; /* Space between inputs for mobile */
            }
        }

        /* ------------------------------ 
           UPDATE ITEM STYLES
        --------------------------------- */
        .gallery-item {
            position: relative; 
            padding: 20px; 
            margin: 20px 0; 
            border: 1px solid white; 
            background: rgba(0, 0, 0, 0.7); 
            border-radius: 10px; 
        }

        .decor-gif-left {
            position: absolute;
            top: -10px;
            left: -20px; 
            width: 50px; 
            height: auto;
            z-index: 2; /* Ensure it is on top */
        }

        .decor-gif-right {
            position: absolute;
            top: -10px;
            right: -20px; 
            width: 50px; 
            height: auto; 
            z-index: 2; /* Ensure it is on top */
        }

        /* Symbol Divider */
        .symbol-divider {
            text-align: center; 
            margin: 15px 0; 
            font-size: 3rem; 
            color: white; /* Change color if needed */
            text-shadow: 
                0 0 10px rgba(255, 0, 0, 1), /* Red glow */
                0 0 20px rgba(255, 0, 0, 1),
                0 0 30px rgba(255, 0, 0, 1);
        }

        /* No symbol after last update post */
        .gallery-item:last-child::after {
            content: none;
        }

        /* Pagination */
        .pagination {
            display: flex; 
            justify-content: center; 
            margin: 20px auto; /* centers the container */
            width: 90%;  /* makes pagination container responsive */
            max-width: 700px; /* consistent max width */
            padding: 0 10px; /* adds padding for responsive design */
        }

        button {
            background-color: transparent; 
            border: none; 
            margin: 0 5px; 
            font-size: 1rem; 
            cursor: pointer; 
            color: white; /* Text color for buttons */
            font-family: 'MS UI Gothic'; /* Use MS UI Gothic for buttons */
            text-shadow: none; /* No glow for buttons */
            flex: 1; /* Makes buttons fill available space */
        }

        /* ------------------------------ 
           FOOTER STYLES
        --------------------------------- */
        footer {
            text-align: center; 
            font-family: 'MS UI Gothic'; 
            font-size: 1rem; 
            padding: 20px 0; 
        }
    </style>
</head>
